name: CI

"on":
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  uv-version: "0.11.10"
  python-version: "3.14"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.uv-version }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pytest
        shell: bash
        run: |
          source .venv/bin/activate
          uv run pytest -m "not requires_codex and not requires_gemini"

      - name: Run pre-commit
        shell: bash
        run: |
          source .venv/bin/activate
          uv run pre-commit run --all-files

      - name: Check release version sync
        shell: bash
        run: |
          source .venv/bin/activate
          uv run samsara-cli release check-version
