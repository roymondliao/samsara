silent_failure_conditions:
  - description: >
      An agent that reads only the first 3 questions of the Yin-Side Check (e.g., due to
      context truncation or early termination of a long file read) will not encounter
      question 4 and will not perform the single-writer check. This is a silent failure:
      the invariant exists in the file but is invisible to the agent. The only detection
      signal is a subsequent audit of a skill that was designed with dual-writer artifacts
      and shipped without triggering question 4.
    deferred_to_feature_iteration: false

  - description: >
      The K3b cross-session half-finished state consequence (named in question 4) is not
      explained in the Yin-Side Check context — it is named as a known failure label.
      Agents encountering K3b for the first time in question 4 may not understand what
      it means and may not treat it as a hard stop. If K3b is not defined elsewhere in
      scope for the agent reading this skill, the warning has reduced deterrent force.
    deferred_to_feature_iteration: false

