debt_registered: true
debt_location: >
  changes/2026-05-20_extract-pre-thinking-step/death-tests.md — Coverage
  Verification section, note on "Degradation - planning starts without
  pre-thinking.md"; and DT-6 known_shortcuts item above.

narrative: |
  The primary risk in this task is abstractness: tests that describe behavior
  without naming what observable output proves correctness. Each scenario was
  written with an explicit "Observable pass criterion" that names the specific
  text or instruction that must appear in the implementation files. This makes
  the tests reviewable by a human comparing the skill files to the criteria.

  One gap remains: acceptance.yaml scenario "Silent failure - LLM leading the
  answers" has three sub-criteria. DT-6 covers one (the AskUserQuestion gate).
  The other two (non-leading question phrasing, distribution) are either style
  constraints enforced by flow.md wording (verifiable in Task 2) or multi-session
  metrics not expressible as single-scenario tests. This is noted in known_shortcuts
  and assumptions_made.

  DC-7 (stale pre-thinking — planning reads old pre-thinking.md from a prior
  research cycle) from 2-plan.md is not in the required task scenarios and was not
  added. It would be a Task 3 concern (planning guard must check timestamp or
  session marker). If the feature iteration needs this covered, it should be added
  to Task 3's scope.

