task_id: task-1
completion_status: done_with_concerns

known_shortcuts:
  - description: >
      DT-6 (Commitment via AskUserQuestion) maps to acceptance.yaml scenario
      "Silent failure - LLM leading the answers" but covers only one sub-case:
      commitment inferred from conversation. The full acceptance.yaml scenario also
      requires that Step A questions are non-leading (no embedded recommendations) and
      that commitment distribution shows non-zero "Accept gap" rates across features.
      The distribution check cannot be expressed as a single-session behavioral test.
      DT-6 verifies the AskUserQuestion gate; it does not verify question phrasing
      or multi-session distribution.
    deferred_to_feature_iteration: false

  - description: >
      "Degradation - planning starts without pre-thinking.md" in acceptance.yaml is
      partially deferred to Task 3 (planning SKILL.md modification). DT-1 covers the
      pre-thinking detection side; the planning guard (blocking when pre-thinking.md
      absent) is not tested here because it is outside Task 1's file scope. The
      cross-reference note in coverage verification makes this gap visible to Task 3.
    deferred_to_feature_iteration: true

silent_failure_conditions:
  - description: >
      If the SKILL.md or flow.md produced in Tasks 2–3 uses different section header
      text than "## Step C — Commitment", DT-1 would pass as written but the skill
      would fail at runtime — the detection string would not match. These tests assume
      the exact header string. No verification is possible until Tasks 2–3 produce
      their files.
    deferred_to_feature_iteration: true

  - description: >
      DT-5 (file-edit detection) assumes the LLM implementation tracks "last-written
      state" between Step A and Step B. If the implementation uses a diff approach
      (comparing to a hash, a snapshot variable, or reading back the file) and that
      state is lost between agent turns (e.g., context window compression), the test
      scenario cannot be reproduced as written. The failure mode would be silent:
      file-edit goes undetected without error.
    deferred_to_feature_iteration: true

