known_shortcuts:
  - description: >
      The condensed Q4 removes the phrase "race conditions between sessions" from bullet 2.
      The original read "introduce K3b cross-session half-finished state and race conditions
      between sessions." The condensed version reads "introduce K3b cross-session state."
