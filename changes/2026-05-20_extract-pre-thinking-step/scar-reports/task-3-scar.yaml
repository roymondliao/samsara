completion_status: done

known_shortcuts:
  - description: >
      The frontmatter `description` field in skills/planning/SKILL.md still says
      "Use when research/kickoff is complete" without mentioning pre-thinking as a
      prerequisite. An agent routing by description alone might invoke planning without
      having run pre-thinking — but the Prerequisites guard inside the skill body will
      stop it. The description is a routing hint, not a gate; the omission is acceptable
      but noted.
    deferred_to_feature_iteration: false

  - description: >
      The planning skill body is silent about pre-thinking internals (it just reads
      the artifact). This is correct per task spec. However, the guard text says
      "Re-invoke samsara:pre-thinking" without specifying the feature directory context.
      An agent that doesn't carry the feature context across skill invocations could
      invoke pre-thinking in the wrong directory. This is a samsara framework-level
      issue, not a Task 3 issue.
    deferred_to_feature_iteration: true

silent_failure_conditions:
  - description: >
      The guard text says STOP and re-invoke samsara:pre-thinking. If the LLM agent
      reads the guard but interprets "STOP" as advisory (not mandatory) and proceeds
      to Step 2 anyway, the failure is silent — no runtime enforcement exists. The
      only protection is the explicitness of the guard wording. The wording uses
      bold **STOP** and "Do not proceed to Step 2" which is as strong as samsara
      text instructions get. But it is still an LLM behavioral contract, not a
      code assertion.
    deferred_to_feature_iteration: false

  - description: >
      If a user manually creates a pre-thinking.md that contains "## Step C — Commitment"
      but with a Decision value of "Return to Research" (indicating planning should NOT
      start), the planning guard passes — it only checks for presence of the section,
      not the Decision value. Planning would proceed on a "Return to Research" commitment.
      This is a gap in the guard condition. The task spec's guard only checks for section
      presence, so this behavior matches the spec — but it is a known silent failure path.
    deferred_to_feature_iteration: false

