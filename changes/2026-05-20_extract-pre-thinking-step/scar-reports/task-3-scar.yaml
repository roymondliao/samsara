narrative: |
  Task 3 makes three surgical changes to skills/planning/SKILL.md:
  1. Prerequisites section: added pre-thinking.md entry plus explicit guard
  2. dot graph: replaced start->prethink->spec chain with start->guard->spec,
     added blocked node, removed prethink and human_pt nodes entirely
  3. Body: removed all 52 lines of Step 1.5 section

  The guard wording is the critical element. It uses bold **STOP** and explicitly
  names both failure conditions (absent file, present file missing Step C section).
  This matches the task spec's guard requirement verbatim.

  One silent failure path was identified that is within spec but worth noting: the
  guard checks for presence of "## Step C — Commitment" section but not for the
  Decision value inside it. A "Return to Research" commitment would pass the guard.
  The task spec prescribes only presence-check; this is intentional design in the
  spec (the planning guard is not a commitment-value validator). Noted for feature
  iteration if decision-value validation is later deemed necessary.

  The assumption about "samsara:pre-thinking" invocation convention is unverified
  because the samsara-bootstrap skill (Tasks 4-5 scope) has not been read. The
  pattern matches existing text in the same file ("invoke samsara:implement"),
  making this low risk.

