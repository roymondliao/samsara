  - original_section: known_shortcuts
    original_description: >
      Gate could be placed after unit-test writing.
    resolution: >
      Placed the gate as execution-order step 4 (before "Write unit tests" at step 5),
      added the digraph edge death_test -> contract_gate -> unit_test, added a Yin-side
      "Test Contract Gate before unit tests" constraint, and pinned the before-unit
      ordering with GATE_BEFORE_UNIT directional tokens + test_gate_runs_before_unit_tests.

  # --- Review-round 2 (dual review: yin FAIL, quality PASS_WITH_CONCERNS) ---
  - original_section: review_finding_critical_1
    original_description: >
      Ordering was asserted by LABEL text ("Test Contract Gate (before unit tests)"),
      not by POSITION. Moving the gate after the unit-test step while keeping the label
      left every presence token green — the ordering invariant was not enforced. A
      token proves presence, never order.
    resolution: >
      Added a STRUCTURAL ordering check to _contract_tokens.py: numbered_steps() parses
      the numbered execution-order step list and step_index_of_concept() returns the
      POSITIONAL index of the step whose BODY carries a concept (rewrap-robust: matches
      the step body, not an exact label). New STEP_DEATH_TEST/STEP_CONTRACT_GATE/
      STEP_UNIT_TEST identify the three steps; STEP_UNIT_TEST is anchored to the start of
      the body ("^\**writ.* unit tests") so it does not also match the gate body's
      "... writing unit tests". TestStructuralOrderingDeath now asserts
      death_index < gate_index < unit_index on the real SKILL.md, and
      test_structural_check_reddens_on_synthetic_misplaced_gate constructs a SYNTHETIC
      gate-after-unit list (label preserved) and proves the structural check goes RED.
      Verified by hand that mutating the REAL SKILL.md step order (gate moved after unit)
      drives the invariant False while presence tokens stay green. The presence token is
      kept only as a secondary signal; the load-bearing assertion is positional. The
      parser fails LOUD (None + caller assert) when a step cannot be located.
    deferred_to_feature_iteration: false
  - original_section: review_finding_critical_2
    original_description: >
      TEST_CONTRACT_GATE's bare rx("contract\s+gate") matched any "contract gate" prose
      ("deployment contract gate"), and its comment cited
      test_unrelated_gate_mentions_are_missing_contract_gate — a test that did not exist
      (a comment citing a nonexistent test is a lie).
    resolution: >
      Tightened the TEST_CONTRACT_GATE token: the bare "contract gate" alternative was
      replaced by "contract gate ... before ... unit test" (and the reverse) so the gate
      is bound to the test/unit-test context; the literal "test contract gate" and the
      reference PATH remain. Rewrote the comment to reference a test that now EXISTS:
      created test_unrelated_contract_gate_prose_is_missing_contract_gate (polarity/
      decoy) which feeds deployment/data/billing "contract gate" prose and asserts the
      concept is reported MISSING. Verified no token comment references a nonexistent
      test (the two remaining test-name references — _missing_contract_source,
      _missing_fix_concept — both exist in task-2's test_implementer_test_contract.py).
    deferred_to_feature_iteration: false
  - original_section: review_finding_important_3
    original_description: >
      SKILL.md step 4 re-pasted the full 6-source contract catalog verbatim from
      references/test-contract.md AND said "do not duplicate the catalog" — a
      self-contradicting duplication that will drift.
    resolution: >
      Removed the inline 6-source list from SKILL.md step 4; replaced with a lean
      principle ("assert a behavioral contract, not implementation details") + pointer
      ("see references/test-contract.md for the contract sources and the both-poles
      rules ... do not restate the source list here"). Added a SKILL-surface
      CONTRACT_PRINCIPLE_AND_POINTER group (principle + pointer only, NOT the source
      list) and re-pointed the evaluator: test_states_contract_principle_and_points_to_reference
      replaces the old test_states_unit_tests_assert_contracts_not_impl (which required
      the implementer-surface CONTRACT_BOUND_UNIT source enumeration). The evaluator
      still reddens if the skill drops the principle OR the pointer (both are required
      concepts). CONTRACT_BOUND_UNIT remains in the shared module for task-2's
      implementer evaluator.
    deferred_to_feature_iteration: false
  - original_section: review_finding_important_4
    original_description: >
      test_registers_reference_as_support_file checked the WHOLE document, not the
      Support Files section, so its name over-promised (a passing mention anywhere
      satisfied a name claiming registration in the support-files list).
    resolution: >
      Renamed to test_registers_reference_in_support_files_section and scoped it to the
      '## Support Files' section via the shared support_files_section() helper —
      consistent with the death test test_reference_registered_as_support_file.
    deferred_to_feature_iteration: false
  - original_section: review_finding_important_5
    original_description: >
      The Support Files section search hard-coded "## support files" and, on a heading
      rename, failed with a misleading "section absent" message.
    resolution: >
      Introduced a declared/commented anchor SUPPORT_FILES_HEADING and a
      support_files_section() helper that returns None when the heading is absent. The
      death test now emits an HONEST message that distinguishes "no section matching the
      declared anchor — heading may have been RENAMED" from "section EXISTS but does not
      register the path". EXECUTION_ORDER_HEADING is likewise a declared anchor for the
      structural ordering parser, with a "heading may have been renamed" message.
    deferred_to_feature_iteration: false
  - original_section: review_suggestions
    original_description: >
      Cheap suggestions: comment the SKILL path constant as an intentional anchor;
      single-source the "test-contract.md" literal; note the location of
      test_silent_green_decoy_separates_poles.
    resolution: >
      Done the cheap ones: added a comment marking the SKILL = ROOT/... constant as an
      intentional load-bearing anchor (parallel to CONTRACT_REFERENCE_SUPPORT_FILE);
      introduced module-level REFERENCE_PATH_RX = r"test-contract\.md" and routed
      CONTRACT_BOUND_UNIT / TEST_CONTRACT_GATE / CONTRACT_REFERENCE_SUPPORT_FILE /
      CONTRACT_PRINCIPLE_AND_POINTER through it so a reference rename is single-source.
      test_silent_green_decoy_separates_poles is left in
      TestNewConceptsAreNotGreenByConstructionDeath — it guards a SILENT_GREEN_GUARD
      decoy invariant and reads naturally alongside the other new-concept decoy tests;
      relocating it would split the decoy proofs across classes for no gain. Noted here
      per the suggestion.
    deferred_to_feature_iteration: false
