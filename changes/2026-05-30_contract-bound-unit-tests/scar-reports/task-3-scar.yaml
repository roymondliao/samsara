task_id: task-3
completion_status: done  # done | done_with_concerns | blocked

narrative: >
  Task 3 updates the implement ORCHESTRATION skill (skills/implement/SKILL.md) to
  make a Test Contract Gate mandatory BEFORE unit tests, while keeping the skill
  LEAN — the gate is a short directive that POINTS to references/test-contract.md
  rather than re-pasting the catalog. Added four new SKILL-surface concept groups
  to the single shared token source (_contract_tokens.py): TEST_CONTRACT_GATE,
  GATE_BEFORE_UNIT, DEATH_TEST_FIRST, CONTRACT_REFERENCE_SUPPORT_FILE. None were
  added to REFERENCE_CONCEPTS (per the DELIBERATELY EXCLUDED contract — those are
  reference-doc concepts only). Folded in the cross-file STEP 0 desync fix: SKILL.md
  digraph node and execution-order line moved from "three"/"三問" to "four"/"四問"
  to match task-2's agents/implementer.md, guarded by a desync death test.

known_shortcuts:
  - description: >
      Risk of duplicating the whole test-contract catalog inside SKILL.md to make
      the evaluator trivially green (the over-fit pole this feature exists to kill,
      and a second divergent source of truth). MITIGATED: the Test Contract Gate is
      a short directive that explicitly says "Do not duplicate the catalog here; the
      reference is the single source of truth" and points to references/test-contract.md.
      The skill names only the contract-source list and the two red-flag poles, not
      the full snapshot/spy/minimum-contract catalog.
    deferred_to_feature_iteration: false
  - description: >
      Risk of adding a Test Contract Gate that is NOT placed before unit-test
      writing (a gate run after the tautological test is already on disk is
      worthless). MITIGATED: the gate is step 4 (between death tests at step 3 and
      "Write unit tests" at step 5) in the execution order, is drawn before
      unit_test in the digraph, and a Yin-side constraint plus death test
      (test_gate_runs_before_unit_tests, GATE_BEFORE_UNIT tokens) pin the
      before-unit ordering directionally.

silent_failure_conditions:
  - description: >
      If a future edit guards only the over-fit pole (brittleness) and drops the
      silent-green / tautological pole, the skill would accept tautological unit
      tests that never go red. GUARDED by test_silent_green_pole_flagged,
      test_flags_both_poles (BRITTLENESS_FILTER + SILENT_GREEN_GUARD), and
      test_silent_green_decoy_separates_poles which proves SILENT_GREEN_GUARD is NOT
      satisfied by brittleness-only prose (so the omission cannot pass silently).
    deferred_to_feature_iteration: false
  - description: >
      If a future edit re-introduces a "three"/"三問"/"three prerequisite" STEP 0
      count anywhere in SKILL.md, the orchestration desyncs from agents/implementer.md
      (agent answers four, skill claims three) with nobody alerted. GUARDED by
      test_no_three_questions_desync_survives (checks "三問", "three questions",
      "three prerequisite") and test_no_surviving_three_questions_reference.
    deferred_to_feature_iteration: false
  - description: >
      If a future edit removes references/test-contract.md from the Support Files
      section, the Test Contract Gate becomes a dangling pointer — the dispatched
      implementer cannot locate the protocol via the skill's file index. GUARDED by
      test_reference_registered_as_support_file, which asserts the path appears
      WITHIN the '## Support Files' section (scanned to the next H2), not merely
      somewhere in the document.
    deferred_to_feature_iteration: false
  - description: >
      A new SKILL-surface concept token could be green-by-construction (key on the
      bare word "gate" — the skill has Execution strategy gate / Completion gate /
      Auto Mode Gate — or on "before"/"unit"/"death") and never go red. GUARDED by
      test_new_concepts_fail_on_hostile_decoy (asserts TEST_CONTRACT_GATE,
      GATE_BEFORE_UNIT, DEATH_TEST_FIRST all report MISSING on hostile decoy prose
      that sprinkles in those exact words) and test_new_concept_tokens_are_not_pinned_headings.
    deferred_to_feature_iteration: false
  - description: >
      The reference path literal "test-contract.md" is now single-sourced as
      REFERENCE_PATH_RX and consumed by CONTRACT_BOUND_UNIT, TEST_CONTRACT_GATE,
      CONTRACT_REFERENCE_SUPPORT_FILE, and CONTRACT_PRINCIPLE_AND_POINTER. A literal
      path is legitimately the contract for a support-file reference (the exact path
      is what must be present), so a rename of references/test-contract.md still
      requires a deliberate update — but now a ONE-line change to REFERENCE_PATH_RX,
      not a scatter-edit. Acceptable single-source coupling, recorded so a future
      reference rename is known to require that one-line update.
    deferred_to_feature_iteration: false
  - description: >
      The structural ordering check (death < gate < unit) depends on the numbered
      execution-order step list being machine-parseable ("N. body" lines under the
      '## Per-Task Execution Order' heading) and on STEP_UNIT_TEST being anchored to
      the START of the unit-test step body. If a future author rewrites the steps as
      an unnumbered bullet list, the parser returns an empty list and the death tests
      FAIL LOUD (asserting steps is not None / index is not None) rather than passing
      silently. If the unit-test step is reworded to no longer start with "Write/
      Writing unit tests" (e.g. "Author the unit tests"), STEP_UNIT_TEST returns None
      and the ordering test fails loud. Both are loud, not silent — recorded so a
      future step rewrite knows to update STEP_* tokens in _contract_tokens.py.
    deferred_to_feature_iteration: false

