known_shortcuts:
  - description: >
      Risk of adding a slogan ("write behavior tests, not implementation tests")
      without a checkable contract source. MITIGATED: the execution-order line and
      the new "Contract-Bound Unit Tests" section name the canonical contract
      sources verbatim (observable behaviour, public API/schema, user-visible
      output, documented artifact shape, stable boundary interaction, bug/
      death-case contract) and point at references/test-contract.md. The evaluator
      enforces this via CONTRACT_BOUND_UNIT tokens that go RED on decoy prose.
    deferred_to_feature_iteration: false
  - description: >
      Risk of treating every test failure as an implementation failure. MITIGATED:
      the "implement minimal code to pass all tests" line now carries the
      fix-the-test caveat inline (not only in a faraway note), and a death test
      (test_fix_the_test_caveat_rides_the_execution_order_line) pins that the
      caveat rides the execution-order line itself.
    deferred_to_feature_iteration: false

silent_failure_conditions:
  - description: >
      If a future edit re-introduces a "three questions"/"three prerequisite"
      occurrence anywhere in agents/implementer.md, the STEP 0 count silently
      desyncs (agent answers four, some line claims three). GUARDED by
      test_no_three_questions_desync_survives + test_no_surviving_three_questions_reference.
    deferred_to_feature_iteration: false
  - description: >
      If a future edit guards only the over-fit pole (brittleness) and drops the
      silent-green pole — the "assert less" trap — the agent would write
      tautological tests that never go red. GUARDED by test_silent_green_pole_guarded
      and test_guards_both_poles (both BRITTLENESS_FILTER and SILENT_GREEN_GUARD).
    deferred_to_feature_iteration: false
  - description: >
      If a future edit lets anti-over-fit language bleed onto death tests, a death
      test pinning its exact failure mode could be silently softened. GUARDED by
      test_anti_overfit_does_not_weaken_death_tests (UNIT_VS_DEATH concepts) and an
      explicit "Unit tests are not death tests" paragraph in implementer.md.
    deferred_to_feature_iteration: false
  - description: >
      A new concept token added to _contract_tokens.py could be green-by-
      construction (key on the bare words "contract"/"fix") and never go red.
      GUARDED by test_new_concepts_fail_on_hostile_decoy, which asserts every new
      CONTRACT_BOUND_UNIT and FIX_THE_TEST concept is reported MISSING on hostile
      decoy prose that sprinkles in "contract" and "fix".
    deferred_to_feature_iteration: false
  - description: >
      The tightened names_a_contract_source token binds source words to the literal
      verb "assert" within 80 chars. If implementer.md is rewritten to express the
      binding WITHOUT the word "assert" (e.g. "every unit test is pinned to a named
      contract source: observable behaviour ..."), only the test-contract.md PATH
      token would still fire — the source-binding tokens would silently stop
      contributing, and a future presence-not-binding regression in those source
      tokens would go unnoticed. PARTIALLY GUARDED: the path token keeps the concept
      green and the mention-only death test keeps it honest, but the assert-binding
      phrasings are not themselves regression-pinned against an honest reword.
      Accepted for now; flag for feature-iteration if tasks 3-6 reword the binding.
    deferred_to_feature_iteration: true

