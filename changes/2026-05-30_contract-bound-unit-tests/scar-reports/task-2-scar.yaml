debt_registered: true
debt_location: >
  agents/implementer.md (STEP 0 intro, execution-order steps 1/4/6, new
  "Contract-Bound Unit Tests" section, Self-Review, Report Format) and
  tests/test_contract_bound_tests/_contract_tokens.py (new CONTRACT_BOUND_UNIT +
