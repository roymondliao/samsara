narrative: |
  Task 2 binds the implementer agent's unit-test step to a checkable contract and
  guards both failure poles. The highest-leverage move was making the
  execution-order line itself carry the constraints (contract-binding on step 4,
  fix-the-test caveat on step 6) so an agent following the numbered steps cannot
  skip them.

  The trickiest correctness concern was the new tokens being green-by-
  construction: "contract" appears in every scar-report sentence and "fix" appears
  everywhere in the agent file. The CONTRACT_BOUND_UNIT and FIX_THE_TEST tokens
  therefore bind those words to the *act* (assert/bind a test to a contract; fix a
  test asserting the WRONG contract) and are decoy-tested against hostile prose so
  they can actually go red. The death tests were verified red before the
  implementer edits (17 failed, 2 passed — the 2 passing being the decoy and
  pinned-heading guards), then green after (19 passed).

resolved_items:
