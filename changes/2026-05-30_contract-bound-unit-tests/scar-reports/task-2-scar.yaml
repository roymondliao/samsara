  # --- Dual-review remediation (yin FAIL + quality PASS_WITH_CONCERNS) ---------
  - original_section: review_finding_critical_yin
    original_description: >
      FIX_THE_TEST["fix_rotten_test_not_impl"] contained a bare
      rx(r"fix\s+the\s+test") — a presence-not-polarity backdoor (same class as
      task-1's bare "assert less"). A doc ENDORSING the wrong practice ("always fix
      the test to make it pass") would pass identically to "fix the test, not the
      implementation", silently defeating the unit test and the DC3-CAVEAT death
      test that guard polarity.
    resolution: >
      Removed the bare token; replaced with the DIRECTIONAL
      rx(r"fix\s+the\s+test,?\s+not\s+the\s+implementation") and kept the three
      other directional tokens (wrong/rotten-contract->fix, not-every-failing-test,
      do-not-bend-the-implementation). Added polarity DEATH test
      test_endorsing_wrong_practice_is_missing_fix_concept: a synthetic string that
      endorses the wrong practice must be reported MISSING the concept. Mutate-to-red
      verified: OLD bare token covers the endorsing prose (True == backdoor); NEW
      directional token does not (False). Confirmed the live implementer.md step 6
      ("fix the test, not the implementation") still matches a directional token.
  - original_section: review_finding_important_yin
    original_description: >
      CONTRACT_BOUND_UNIT["names_a_contract_source"] was presence-not-binding: bare
      source words (observable behaviour, public api or schema, documented artifact
      shape) fired on a doc that merely MENTIONS them without binding a unit test to
      them ("we reference test-contract.md; observable behaviour is described
      elsewhere").
    resolution: >
      Tightened the source-word tokens to require BINDING to the act of asserting
      (rx unit test must assert ...(observable|public api|artifact|schema); rx
      assert a named contract source ...(...)) while keeping the canonical reference
      PATH token (test-contract.md). Added negative DEATH test
      test_mention_only_sources_are_missing_contract_source: mention-only prose
      (sources named, no assert-binding) must be reported MISSING. Mutate-to-red
      verified. contract_bound_requirement kept as the harder gate.
  - original_section: review_finding_important_yin
    original_description: >
      test_fix_the_test_caveat_rides_the_execution_order_line used a fixed
      lines[anchor_idx:anchor_idx+2] window — over-fit: a behavior-preserving rewrap
      of step 6 across more lines would falsely redden it, ironic in an
      anti-brittleness exemplar.
    resolution: >
      Replaced the fixed +2 window with a scan from the anchor line to the NEXT
      numbered list item ("7."), so the caveat must live within the SAME
      execution-order step however that step is wrapped. Added a bounded fallback
      (anchor+8) if step 7 is ever renumbered, so the caveat must still be near the
      anchor, never an arbitrary distance.
  - original_section: review_finding_important_quality
    original_description: >
      REFERENCE_CONCEPTS intentionally excludes CONTRACT_BOUND_UNIT and FIX_THE_TEST
      (implementer-surface, not reference-doc concepts) but the exclusion was not
      stated at the definition site, risking a future task author blindly adding new
      groups there.
    resolution: >
      Added a DELIBERATELY EXCLUDED comment block at the REFERENCE_CONCEPTS
      definition naming the excluded groups and WHY (agent-surface imperatives the
      reference doc is not responsible for), plus guidance that agent/skill/reviewer
      concepts stay in their own groups.
  - original_section: review_finding_structural
    original_description: >
      The heading-pin check loop and the hostile-decoy coverage check were
      duplicated verbatim across test_test_contract_reference_death.py (task-1) and
      test_implementer_test_contract.py (task-2), risking a split-lie across tasks
      3-6.
    resolution: >
      Extracted authoritative shared helpers into _contract_tokens.py:
      pinned_heading_offenders(groups) -> list[(key, literal)] and
      concepts_covered_by(text, groups) -> set. Updated BOTH task-1's death file and
      task-2's evaluator to call them. Decoy STRINGS kept local in each file
      (genuinely different hostile prose — healthy DAMP); only the CHECK logic is
      shared. Task-1 tests still green (no regression).
