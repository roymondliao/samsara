resolved_items:
  - original_section: assumptions_made
    original_description: >
      code-reviewer can apply the test-contract review without weakening its domain
      reference protocol.
    resolution: >
      Verified during self-iteration via git-diff inspection of code-reviewer.md:
      confirmed Step 0, Reference File Protocol, UNKNOWN outcomes, and domain routing
      are untouched; only a new Review Order step and Issue Classification changed.
      Flag flipped to verified: true.
  - original_section: silent_failure_conditions
    original_description: >
      Initial concern that the structural ordering check could silently misread a
      moved/renamed Review Order step.
    resolution: >
      Traced the failure branches during self-iteration: a missing section returns
      None -> loud assert; a missing step heading returns None -> loud assert; a
      renamed heading fires the section-not-found branch first. No silent path remains.
      Documented the residual (loud) behavior rather than leaving the risk implicit.
  - original_section: silent_failure_conditions
    original_description: >
      ROUND-2, previously-unsurfaced (round-1 reviewer noted the scar omitted it):
      REVIEWER_REFERS_SILENT_ROT token1 `rx(r"refer[^.?!\n]{0,60}(samsara:)?code[- ]reviewer")`
      was a PRESENCE-NOT-POLARITY weak token. It fired on the GENERIC Scope-Boundary
      hand-off line already present in code-quality-reviewer.md ("→ Refer to
      samsara:code-reviewer"), so a future author could DELETE the SPECIFIC "refer test
      silent-rot/correctness to the yin reviewer" sentence and the concept would silently
      stay COVERED via the generic line — the role-split enforcement would rot green. The
      group's own comment claimed DIRECTIONAL but token1 was not. This risk was NOT
      recorded in the round-1 scar.
    resolution: >
      Removed the bare referral token. Every remaining token binds the referral ACT to the
      silent-rot/correctness/tautological/wrong-contract/test SUBJECT (subject-then-refer
      and refer-then-subject), with newline-tolerant gaps because the real binding wraps
      across lines. Added polarity death test
      test_generic_handoff_without_subject_is_missing_referral_concept: a code-quality doc
      with ONLY a generic hand-off is now reported MISSING. Mutate-to-red verified (FAILs
      on the old bare token, PASSes after); the REAL code-quality-reviewer.md confirmed
      still covered via its lines 44-49 silent-rot referral (no over-tighten).
  - original_section: silent_failure_conditions
    original_description: >
      ROUND-2: DISPATCH_TEST_QUALITY_PROMPT token1 `rx(r"test[- ]quality")` was a
      PRESENCE-NOT-POLARITY weak token. It fired on a bare "ensure test quality" mention
      or a lone "## Test-Quality Review" heading with NO brittle/over-fit/tautological/
      silent-green/contract enforcement content, so the DC4 gate could be gutted (drop the
      enforcement bullets, keep the heading) and stay falsely COVERED while the dispatch no
      longer ASKED for the review. Token1 was the weak link; the other tokens were already
      directional.
    resolution: >
      Removed the bare `test[- ]quality` token. The concept now REQUIRES the dispatch block
      to actually ask for brittle/over-fit/tautological/silent-green/contract review. Added
      polarity death test test_bare_test_quality_mention_is_missing_dispatch_concept: a
      block saying only "ensure good test quality" is now reported MISSING. Mutate-to-red
      verified (FAILs on the old bare token, PASSes after); BOTH real dispatch blocks
      confirmed still covered via the existing brittle/tautological bullets (no
      over-tighten).
  - original_section: narrative
    original_description: >
      ROUND-2 optional DRY suggestion (round-1, low-risk): review_order_section() and
      dispatch_block() shared a ~15-line heading-scan-to-next-boundary pattern differing
      only in boundary-heading prefixes.
    resolution: >
      Extracted shared extract_section(lines, start_prefix, end_prefixes); both call sites
      now delegate to it while keeping their DISTINCT boundary criteria (Review Order ends
      at '## ' only so its '### N.' step headings stay CONTENT; dispatch blocks end at
      '### '/'## ' so sibling reviewer blocks do not merge and defeat the per-block DC4
      check). Full suite re-run: 97 passed, no regression. Low-risk as scoped: passing
      tests unchanged.

