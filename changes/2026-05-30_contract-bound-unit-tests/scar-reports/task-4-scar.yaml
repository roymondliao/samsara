      its domain-reference protocol (Step 0 domain routing, the UNKNOWN hard-stops, and
      the reference-file-unavailable rule).
    verified: true
    note: >
      VERIFIED by diff inspection: the change inserts a new Review Order step (4) and
      renumbers correctness 5->6, and extends Issue Classification. It does NOT touch
      Step 0, the Reference File Protocol, the UNKNOWN outcomes, or domain routing
      (git diff shows no edits to those sections). The new step is driven by Mother
      Rule 3, consistent with the existing Silent Rot step, so it adds a review concern
      without altering how the reviewer selects/loads its reference file.
    deferred_to_feature_iteration: false
  - assumption: >
      The dispatch-template.md section parser (dispatch_block) correctly isolates the
      two reviewer dispatch sub-blocks by their '### Yin reviewer' / '### Code Quality
      reviewer' headings, so a per-block check is genuinely per-block.
    verified: true
    note: >
      VERIFIED at runtime: test_both_blocks_distinct_and_both_carry_prompt asserts the
      two blocks resolve to DIFFERENT text and each independently carries the prompt;
      it passes, confirming the parser distinguishes the blocks rather than returning
      overlapping/identical slices.
    deferred_to_feature_iteration: false
  - assumption: >
      The new reviewer-surface tokens are intent-bearing and can go RED (not
      green-by-construction on the common words test/review/contract/coupling).
    verified: true
    note: >
      VERIFIED at runtime by five guards: test_new_concepts_fail_on_hostile_decoy
      (all six groups MISSING on hostile prose), test_new_concept_tokens_are_not_
      pinned_headings, test_endorsing_wrong_practice_is_missing_fix_concept (polarity),
