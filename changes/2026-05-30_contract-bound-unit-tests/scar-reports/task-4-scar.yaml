task_id: task-4
completion_status: done  # done | done_with_concerns | blocked

narrative: >
  Task 4 makes REVIEWER enforcement real — closing the loop so the contract-bound
  unit-test gate documented in the reference/implementer/skill/planning surfaces is
  actually ASKED at review time (death case DC4). Three surfaces changed plus the
  shared token module:

  (1) agents/code-reviewer.md gains a new Review Order step "4. Test Quality (tests
  reviewed first)" inserted BEFORE the correctness step (correctness renumbered 5->6).
  The step makes the yin reviewer review tests as a first-class subject, flag BOTH the
  over-fit pole (brittle) and the silent-green pole (tautological), grant the
  directional "fix the test, not the implementation" verdict, and CHALLENGE a
  perfunctory contract label (Clean Scar — a slogan mapping to no observable
  behavior/API/schema/artifact/death-case). Issue Classification updated to score
  these.

  (2) agents/code-quality-reviewer.md gains a Scope-Boundary paragraph claiming
  STRUCTURAL test coupling (tests coupled to implementation structure) as its lane via
  the Coupling principle, and explicitly REFERRING test silent-rot/correctness
  concerns to the yin reviewer — keeping the role split sharp.

  (3) skills/implement/dispatch-template.md gains a "## Test-Quality Review (mandatory)"
  block inside BOTH reviewer dispatch templates (Yin block: brittle/tautological/
  fix-the-test/Clean-Scar; Code Quality block: structural test coupling + refer
  silent-rot to yin). This is the DC4 core: the gate is now ASKED on dispatch, not
  merely documented.

  (4) tests/test_contract_bound_tests/_contract_tokens.py gains six reviewer-surface
  concept groups (REVIEWER_REVIEWS_TESTS, REVIEWER_FIX_THE_TEST,
  REVIEWER_CHALLENGE_CLEAN_SCAR, REVIEWER_STRUCTURAL_TEST_COUPLING,
  REVIEWER_REFERS_SILENT_ROT, DISPATCH_TEST_QUALITY_PROMPT), NOT merged into
  REFERENCE_CONCEPTS (they are reviewer/dispatch-surface, not reference-doc concepts).

  The "tests reviewed BEFORE correctness" claim is asserted STRUCTURALLY (the exact
  mistake that failed task-3 review): the evaluator reads the source positions of the
  Test-Quality step heading and the Correctness step heading within the Review Order
  section and asserts tests_pos < correctness_pos. A synthetic reversed-order fixture
  (labels preserved, positions swapped) proves the check goes RED — which a presence
  token never would. The directional tokens are decoy-tested (hostile prose ->
  MISSING) and polarity-tested (endorsing-wrong-practice / mere-mention -> MISSING).
  Verified RED first: 16 protocol/death tests failed against the unmodified docs while
  the 8 token-quality guards (decoy, polarity, pinned-heading, reversed-fixture,
  pre-existing referral) passed; then GREEN after the doc edits (24 passed). Full
  contract-bound suite: 95 passed, no regression.

  ROUND-2 (post dual review, both PASS_WITH_CONCERNS, no Critical). Two reviewer-surface
  tokens carried the recurring PRESENCE-NOT-POLARITY disease (a weak token in an OR-tuple
  sets the coverage floor and nullifies its directional siblings):
  (a) REVIEWER_REFERS_SILENT_ROT token1 `refer ... code-reviewer` fired on the GENERIC
  Scope-Boundary hand-off line already in code-quality-reviewer.md, so the SPECIFIC
  "refer test silent-rot to the yin reviewer" sentence could be deleted and the concept
  stay falsely COVERED. (b) DISPATCH_TEST_QUALITY_PROMPT token1 `test[- ]quality` fired on
  a bare "ensure test quality" with no brittle/tautological/contract enforcement content.
  Both bare tokens REMOVED; remaining tokens bind the act to its directional subject. Two
  new polarity death tests added (test_generic_handoff_without_subject_is_missing_referral_concept,
  test_bare_test_quality_mention_is_missing_dispatch_concept), mutate-to-red verified
  (both FAIL on the old weak tokens, PASS after) and the REAL docs confirmed still covered
  (no over-tighten). The optional DRY suggestion was applied: review_order_section() and
  dispatch_block() now share extract_section(lines, start_prefix, end_prefixes), each
  keeping its distinct boundary-prefix set (Review Order ends at '## ' only; dispatch
  blocks end at '### '/'## '). Full contract-bound suite: 97 passed, no regression.

known_shortcuts:
  - description: >
      Expected shortcut (from task spec): the reviewer agent contains rules but the
      dispatch prompt never activates them (DC4). MITIGATED: the dispatch template
      carries a mandatory Test-Quality Review block in BOTH reviewer dispatch
      sub-blocks, and the evaluator checks each block SEPARATELY
      (test_yin_dispatch_block_asks_for_test_quality,
      test_quality_dispatch_block_asks_for_test_quality,
      test_both_blocks_distinct_and_both_carry_prompt) so a prompt added to only one
      block cannot satisfy the gate. This is the death case this task exists to close;
      it is covered, not deferred.
    deferred_to_feature_iteration: false
  - description: >
      Expected shortcut (from task spec): both reviewers duplicate the same
      responsibility instead of splitting yin silent-rot vs structural coupling.
      MITIGATED: the code-quality reviewer's added paragraph explicitly draws the line
      ("you own how the test is structurally coupled; the yin reviewer owns whether
      the test can fail and whether it asserts the right contract") and the evaluator
      pins the referral (REVIEWER_REFERS_SILENT_ROT) plus the structural-coupling lane
      (REVIEWER_STRUCTURAL_TEST_COUPLING) as DISTINCT concepts. The code-coupling decoy
      death test proves the structural-test-coupling token does not match generic
      code-coupling prose, so the two lanes cannot silently collapse into one.
    deferred_to_feature_iteration: false
  - description: >
      _contract_tokens.py is a single module split by SURFACE comment-banner only, not by
      file. Task-4 added six reviewer/dispatch-surface groups, worsening the module's size
      and the "many death reasons in one file" smell flagged across tasks. A by-surface
      module split (reference vs implementer vs skill vs reviewer vs planning groups) is
      DEFERRED to feature iteration: it is a cross-task refactor touching every evaluator's
      imports, outside task-4's file scope, and is NOT a blocker (the keys are the stable
      public contract regardless of which file they live in). Round-1 review confirmed this
      as deferred, not Critical.
    deferred_to_feature_iteration: true

silent_failure_conditions:
  - description: >
      The reviewer-surface concept tokens assert PRESENCE/DIRECTION of instruction
      text in markdown agent files; they cannot verify that a live reviewer LLM
      actually OBEYS the instruction at runtime. A reviewer that reads the Test-Quality
      step but rubber-stamps a tautological test would pass every test here and still
      let the rotten test through. The evaluator guards the instruction surface, not
      reviewer behavior — the same structural limit as tasks 2/3/5.
    deferred_to_feature_iteration: true
  - description: >
      The structural ordering check (tests < correctness) reads '### ' step HEADINGS
      within the '## Review Order' section. If a future edit moves the test-quality
      review OUT of a numbered '### ' step (e.g. into a paragraph under the Mother
      Rules) while keeping prose, first_step_pos_matching would return None and the
      death test fails LOUD — but a heading whose body drops every STEP_TEST_REVIEW
      token (test+quality/brittle/etc.) would also return None and read as "step
      removed", which is the intended loud failure, not a silent one. The residual
      risk: if BOTH a renamed Review Order heading AND a moved step coincided, the
      section-not-found branch fires first (loud), so no silent path remains here.
    deferred_to_feature_iteration: false

