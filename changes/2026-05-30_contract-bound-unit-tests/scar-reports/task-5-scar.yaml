  # --- Dual-review (yin FAIL + quality PWC) fixes, 2026-06-01 -----------------
  - original_section: review_finding_yin_critical
    original_description: >
      PRESENCE-NOT-POLARITY (4th recurrence): PLANNING_DECOMPOSITION_NAMES_CONTRACT's
      first token rx(r"unit[- ]test\s+contract(\s+source)?") matched ANY mention of the
      phrase, including a NEGATING sentence ("the unit-test contract source is NOT
      required at planning time" / "left to the implementer's discretion"). A SKILL.md
      that drops the decomposition obligation but mentions the phrase would pass.
    resolution: >
      Removed the bare first token. The naming-act token was also tightened from
      rx(r"(name|naming|includes)\s+[^.]{0,40}unit[- ]test\s+contract") to
      rx(r"names?\s+(its|the|each\s+task.s?)\s+unit[- ]test\s+contract\s+source") because
      the looser form still matched "Whether to name a unit-test contract source is left
      to discretion". Only directional tokens remain (declarative "names its/the/each
      task's unit-test contract source"; "contract is named upstream/at planning"). Added
      polarity death test test_negating_decomposition_obligation_is_missing_concept with a
      HOSTILE decoy that USES the compound phrase in a negating context (the DC-DECOY
      missed this because it avoided the phrase). Mutate-to-red verified: the old bare
      token COVERS the negating decoy (death test would fail); the new tokens report it
      MISSING. Live SKILL.md still matches via both retained tokens.
  - original_section: review_finding_yin_important_1
    original_description: >
      unit_test_contract_section_required proved PRESENCE, not REQUIREMENT: tokens fired
      on a template saying "Unit Test Contract section: optional" while the key claims
      "required".
    resolution: >
      Made the concept directional. Tokens now bind the section NAME to a 'must'
      imperative: rx(r"unit[- ]test\s+contract[^.]{0,120}\bmust\b") and the reverse
      rx(r"\bmust\b[^.]{0,120}unit[- ]test\s+contract"). The live template matches via the
      body line "a unit test MUST assert this named contract source" and Rule #4 "the Unit
      Test Contract section MUST name an observable contract source". Added negative death
      test test_optional_section_template_is_missing_required_concept (an "optional"
      template -> reported MISSING). Mutate-to-red verified against the old bare token.
      Tokens carry no "##" so the pinned-heading guard still passes; the two PLANNING
      groups' first tokens are confirmed substring-distinct (no group collapse).
  - original_section: review_finding_yin_important_2
    original_description: >
      Dishonest historical-non-enforcement test: test_known_historical_task_lacks_
      section_and_suite_stays_green only checked fixture state, never asserted the
      evaluator ignores historical files; the name overpromised; the glob-guard missed a
      future SECOND read of changes/** added elsewhere.
    resolution: >
      Renamed to test_evaluator_source_has_no_directory_walk_and_historical_task_would_
      brick. Part (a) now PARSES the evaluator's own source to AST and asserts NO
      directory-walk call exists anywhere (.glob/.rglob/.iterdir/.scandir, os.walk/
      listdir/scandir, glob.glob) — a directory walk is the only mechanism that could
      enforce the section on changes/**/task-*.md, and AST (not substring grep) is immune
      to the docstring that legitimately MENTIONS the forbidden pattern. Part (b) keeps the
      fixture brick-proof (a real historical task file lacks the now-directional required
      section and HAS death tests, so a walk WOULD brick the suite). Both halves are now in
      the name.
  - original_section: review_finding_quality_suggestions
    original_description: >
      (i) Confirm the two PLANNING groups are distinguishable after removing the bare
      token. (ii) DAMP_OVER_DRY orphaned after PLANNING_* groups. (iii) Repeated
      ROOT = Path(__file__).resolve().parents[2] across 5 files. (iv) read_skill() name
      collision across two evaluators.
    resolution: >
      (i) Confirmed distinct (first tokens have no substring overlap; full suite green).
      (ii) Added a one-line cohort comment to DAMP_OVER_DRY explaining it is a
      REFERENCE_CONCEPTS-cohort group left in place to avoid a churny reorder. (iii)
      Exported shared ROOT from _contract_tokens.py; the planning evaluator now imports
      ROOT instead of re-deriving it. (A repo_root() function form was also exported in
      round 2 but had no caller — see review_finding_quality_round2 below, where it was
      removed.) The other 4 evaluators are left untouched per the review's scoping
      (non-destructive); future evaluators import the shared export. (iv) Renamed the
      planning evaluator's read_skill() to read_planning_skill() to remove the
      cross-evaluator name collision.

  # --- Round-2 dual review (yin PWC + quality PWC) fixes, 2026-06-01 ----------
  - original_section: review_finding_yin_important_round2
    original_description: >
      BOUNDARY BLEED = silent-green false-pass. unit_test_contract_section_required used
      `[^.]{0,120}` between the section name and `\bmust\b`. `[^.]` only stops at a
      literal period, so in the full-form task-format template the Death Test
      Requirements comment "<!-- What death tests must be written BEFORE implementation?
      -->" (~109 chars before the "## Unit Test Contract" heading, separated only by `?`,
      `-->`, newlines, dashes) let its `must` bind to the UTC section name. A template
      that marks UTC "optional" but keeps the standard DTR block would false-pass — the
      exact silent-green disease.
    resolution: >
      Tightened the boundary class on BOTH directional tokens from `[^.]` to `[^.?!>\n]`,
      so `must` and the section name must belong to the same clause/line (the newline
      stop is what kills the cross-block DTR bleed; `?`/`!`/`>` close the comment/markdown
      boundaries). STRENGTHENED test_optional_section_template_is_missing_required_concept
      to use a FULL-FORM fixture that INCLUDES the standard DTR comment block ("...must be
      written...") AND marks the Unit Test Contract section optional, asserting the concept
      is reported MISSING. Mutate-to-red verified: this full-form-optional fixture is
      COVERED on the old `[^.]` token (silent-green, test would fail) and reported MISSING
      on `[^.?!>\n]`. Confirmed NO over-tighten: the real skills/planning/task-format.md
      still reports the concept COVERED (via the same-line Rule #4 "Unit Test Contract
      section must name an observable contract source"). Full suite green (71 tests).
  - original_section: review_finding_quality_round2
    original_description: >
      PHANTOM repo_root(). _contract_tokens.py exported both ROOT and repo_root(); no
      caller used repo_root() (the planning evaluator imports the ROOT constant directly).
      A phantom surface commitment.
    resolution: >
      Deleted repo_root() and kept the single-sourced ROOT constant. Confirmed by grep
      that no caller imports/uses the function (the only matches were its own definition
      and an unrelated local `repo_root` variable/param in samsara_cli/release/, a
      different namespace). Updated the ROOT-anchor comment to record why a function form
      was removed and when to add one back (only with a real caller). Full suite green.

