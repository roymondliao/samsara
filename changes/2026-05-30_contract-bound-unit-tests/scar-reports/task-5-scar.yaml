task_id: task-5
completion_status: done  # done | done_with_concerns | blocked

narrative: >
  Task 5 moves the unit-test contract ORIGIN upstream into planning. Two surfaces
  changed: (1) the TEMPLATE skills/planning/task-format.md now has a required
  `## Unit Test Contract` section plus a parallel Rule (#4) forbidding generic
  "appropriate tests" wording and requiring an observable, named contract source;
  the template's "Write unit tests" Implementation Step now references the contract
  gate. (2) skills/planning/SKILL.md's Task Decomposition step (and the process
  digraph node) now tell the planner to name each task's unit-test contract source
  ALONGSIDE the death test requirements, so the contract is named at planning time
  and the implementer asserts it instead of inferring a contract from the current
  implementation.

  The evaluator and its three new concept groups (PLANNING_UNIT_TEST_CONTRACT_SECTION,
  PLANNING_FORBID_GENERIC_UNIT_WORDING, PLANNING_DECOMPOSITION_NAMES_CONTRACT) were
  found ALREADY PRESENT in tests/test_contract_bound_tests/_contract_tokens.py and
  tests/test_contract_bound_tests/test_planning_test_contract.py from a prior partial
  run; the doc edits and this scar report were the missing pieces. I verified the
  evaluator was RED against the unmodified docs (3 death tests + 3 unit tests failing,
  while the 5 decoy/polarity/pinned-heading/historical-non-enforcement guards already
  passed), then turned it GREEN with the doc edits. Scope is TEMPLATE-only: the
  evaluator anchors on the single template path and a death test (DC4-HISTORICAL) pins
  that it never globs changes/**/task-*.md — 64 of 70 historical task files lack the
  section and a global check would brick the suite.

