resolved_items:
  - original_section: known_shortcuts
    original_description: >
      Evaluator only checks keywords and misses instruction surfaces (spec shortcut #1).
    resolution: >
      Resolved within task scope. Built COVERAGE_MANIFEST over all 8 surfaces plus the
      CANONICAL_REQUIRED_SURFACES completeness death test (set-equality), and the
      per-surface coverage tests route through shared concept tokens. Mutate-to-red proven:
      dropping a manifest row breaks set-equality; empty text makes every row's groups
      report missing (non-vacuous).
  - original_section: known_shortcuts
    original_description: >
      Evaluator itself becomes brittle by pinning line numbers or incidental prose (spec
      shortcut #2).
    resolution: >
      Resolved within task scope. The self-refuting meta-test (routing_offenders +
      heading_as_coverage_offenders) fails the suite if any evaluator pins a heading literal
      as coverage or stops routing through the shared tokens. The Compare-based heading scan
      distinguishes a locator (allowed) from heading-as-coverage (bug); both sides pinned by
      mutate-to-red / mutate-to-green death tests that reuse the production scanner.
  - original_section: silent_failure_conditions
    original_description: >
      A privatized evaluator (does its own raw `in` coverage, never imports the shared
      tokens) could drift from the canonical token source.
    resolution: >
      Resolved within task scope. routing_offenders() AST-scans every evaluator for both
      the _contract_tokens import AND a shared-helper reference; verified mutate-to-red
      against a real temporary privatized evaluator file (it WAS flagged, then cleaned up).
      test_evaluator_glob_finds_the_focused_evaluators guards against a vacuously empty scan
      set.
  - original_section: known_shortcuts
    original_description: >
      FIX 2 (round-2 yin review): dead computation + dishonest docstring.
      heading_as_coverage_offenders computed _module_level_locator_names and discarded the
      result, while its docstring claimed an "explicit, documented allow-list" exemption.
    resolution: >
      Removed the dead _module_level_locator_names function and its discarded call.
      Rewrote the docstring to state the exemption honestly: locators are exempt BY
      CONSTRUCTION (a named locator constant is an ast.Name reference, never an ast.Constant
      operand of a Compare), so the scan flags only inline single-line "## heading" literals
      used directly as a Compare operand. No allow-list is maintained.
  - original_section: known_shortcuts
    original_description: >
      FIX 1 + FIX 4 (round-2 review): dead imports and a re-derived routing algorithm.
      test_coverage_manifest.py imported concept_present / concepts_covered_by unused; the
      death test re-derived the routing-detection algorithm verbatim instead of calling the
      production scanner.
    resolution: >
      Removed the unused imports (only missing_concepts is used). Refactored
      routing_offenders to accept an optional {label: source} override and extracted
      _source_routes_through_shared_tokens as the single authoritative routing algorithm;
      the death test now feeds its synthetic privatized evaluator through routing_offenders
      rather than re-deriving imports_shared / names_used / routes. Moved the
      _scan_heading_as_coverage import to the top import block (dropped the E402 noqa) and
      removed the now-unused ast / evaluator_source_files imports from the death module.
      Documented the two marked bets: the required-protocol-surface criterion at
      CANONICAL_REQUIRED_SURFACES and the ast.Name routing proxy + its aliasing/dynamic-
      dispatch limits at routing_offenders.
