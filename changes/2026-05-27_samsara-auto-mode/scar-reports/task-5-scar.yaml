debt_registered: true
debt_location: >
  README auto-mode sections, README docs tests, overview validation-surface list

narrative: >
  Task 5 makes the user-facing auto-mode contract explicit in English and
  Traditional Chinese: auto mode is selected before research, preserves the full
  workflow, routes former human gates to `samsara-auto-gatekeeper`, records
  append-only decisions, and does not support `samsara_config.yaml` in the first
  cut. The validation suite now catches unsupported claims, but this remains a
  static documentation guarantee rather than live autonomous execution proof.

resolved_items:
  - original_section: known_shortcuts
    original_description: >
      Docs could describe future config support as if implemented.
    resolution: >
      Added README death tests that require the explicit phrase
      "`samsara_config.yaml` is not supported" / "不支援 `samsara_config.yaml`"
      and reject positive config-support claims.

  - original_section: known_shortcuts
    original_description: >
      Validation could skip converter coverage because the feature is
      instruction-level.
    resolution: >
      Overview and tests now require the primary evaluator, converter tests, and
      integration pipeline/format validation to be part of the task-5 validation
      surface.
