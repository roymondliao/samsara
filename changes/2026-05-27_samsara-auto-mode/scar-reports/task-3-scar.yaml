resolved_items:
  - original_section: silent_failure_conditions
    original_description: >
      Security review language could still imply accepted risk in auto mode.
    resolution: >
      Added a security/privacy auto gate requiring absent, unknown, failing, or
      partial evidence to record a high-uncertainty `reject` decision and not
      transition to validate-and-ship.

  - original_section: silent_failure_conditions
    original_description: >
      Validate-and-ship could report auto completion without checking the auto
      decision trace.
    resolution: >
      Added a validate-and-ship auto gate requiring `auto-decisions.md` inspection
      before completion, with missing, malformed, generic, or contradictory entries
      failing validation.

  - original_section: silent_failure_conditions
    original_description: >
      If an executing agent ignores the `## Auto Mode Gate` section and follows the
      original transition text, later stages may still wait for input or accept
      risk outside the auto decision log.
    resolution: >
      Expanded later-stage auto gates to cover internal decision points:
      implementation execution-mode selection, iteration triage/blocked-fix/round
      continuation/safety valve decisions, security empty-diff/base-branch/no
      capability/unknown/fail/risk paths, and validation post-append trace checks.
