debt_registered: true
debt_location: >
  skills/codebase-map/SKILL.md Fail-Honest Write Contract — stale_reason field
  not in Task 1 template; doc-presence cannot prove runtime agent obedience
  (both items deferred to feature iteration / validate-and-ship dogfood).

narrative: |
  This task is doc/behavior contract testing — skill doc edits + 7 presence/
  death tests. No new abstractions were built. The test file uses plain file-reads
  and regex/substring assertions.

  Round 1 (initial implementation): 6 tests (DC-4 + 5 unit tests).

  Round 2 (coordinator review): 3 Critical + 2 Important issues addressed.

  Critical 1 (deadlock / dishonest-completion pressure): flow.md step 3 said
  "do not proceed until regen completes" with no exit for a failed regen.
  Combined with codebase-map's definition of "complete" (all phases + Phase 4
  confirm), a failed regen left pre-thinking with no documented exit — risk of
  indefinite block or dishonest "completed" claim. Fixed by adding explicit
  escape clause to both pre-thinking SKILL.md Atomic Context Boundary and
  flow.md step 3: "If auto-initiated regeneration fails, aborts, or is rejected
  at Phase 4 review, do NOT treat it as completed and do NOT block indefinitely:
  proceed with the map explicitly marked stale, record an information gap noting
  the failed regeneration, and continue planning on that basis."

  Critical 2 (scar omits deadlock scenario): silent_failure_conditions entry
  added for the deadlock case; marked resolved via escape clause fix.

  Critical 3 (DC-5 death test): guards the escape clause against silent
  regression. Uses proximity regex: (fails|aborts|rejected).{0,600}proceed
  .{0,300}(information gap|marked stale). Was RED before doc edits, GREEN after.

  Important quality (churn definition diverged): pre-thinking SKILL.md and
  flow.md previously omitted the exclusion list (changes/, docs/, bugfix/).
  An agent reading only pre-thinking would compute different churn than the hook.
  Fixed: both pre-thinking docs now include the full exclusion list inline with a
  cross-reference "(canonical definition: codebase-map SKILL.md Triggers)".

  Important yin — tests (context-blindness): auto-initiate assertions were
  whole-file substring checks. Fixed: all three auto-initiate unit tests now use
  proximity-based regex anchoring "auto-initiate" near "churn"/"threshold"/
  "staleness_churn_threshold". A misplaced token in an unrelated section no
  longer produces a false green.

  Important yin — tests (mislabeled "both poles"): test_unit__codebase_map_skill_
  documents_fail_honest_contract had an inaccurate "both poles" framing. Reframed
  as "positive artifact assertion confirming the fail-honest clauses are present."

  Optional improvements done: module-level compiled patterns (hoisted _NO_BUMP_RE,
  _MARK_STALE_RE, _ESCAPE_CLAUSE_RE); parents[2] path-bet comment added.

  Refused abstraction: no doc-parsing framework or helper class was built.
  The _read_skill() helper is a 1-line file read. No other abstraction has a
  concrete "what would hurt" answer.

  Regen loop verified: codebase-map/SKILL.md process traverses
  start → explorers → synthesize → review → write → done. No step invokes
  samsara:pre-thinking. The loop concern is structurally absent.

  The stale_reason field introduced by the Fail-Honest Write Contract is
  schema-undocumented (not in templates/codebase-map.yaml). Deferred to feature
  iteration — requires a Task 1 template update outside task-3 scope.

  Final test count: 732 passed (17 test_skills + 715 other).

