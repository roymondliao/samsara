known_shortcuts:
  - description: >
      Doc-presence test cannot prove the agent actually obeys the auto-initiate
      instruction at runtime. The test verifies the clause IS in the skill docs;
      it cannot verify the agent FIRES regeneration instead of noting it and
      continuing. The real proof is a live pre-thinking session on a stale map
      (churn > 30) observing whether samsara:codebase-map is invoked before
      Step A proceeds.
    deferred_to_feature_iteration: true
  - description: >
      The Fail-Honest Write Contract introduces a stale_reason field to be
      written to .samsara/codebase-map.yaml on failed/aborted regen. This field
      is not defined in the Task 1 template (templates/codebase-map.yaml). An
      agent following the contract will write a schema-undocumented field.
      On a subsequent full regen that succeeds, this field may be silently
      overwritten or absent. Fixing requires a template schema update (outside
      task-3 scope).
    deferred_to_feature_iteration: true

silent_failure_conditions:
  - description: >
      "auto-initiate" silently degrades to "warn only" if an agent treats the
      imperative as optional. The wording in both pre-thinking SKILL.md and
      flow.md is imperative ("auto-initiate ... before proceeding"), not advisory
      ("consider", "may"). This is the strongest guard available in doc space.
      Only a live session run can confirm the agent fires regen rather than
      noting it. Documented as a known_shortcut deferred to validate-and-ship.
    deferred_to_feature_iteration: false
  - description: >
      The fail-honest contract instructs "do not advance last_updated" only as a
      documented behavioral rule — no runtime enforcement exists. An agent that
      ignores the contract can still bump last_updated even when the doc says not
      to. There is no code-level gate preventing this. The only guard is the
      DC-4 test confirming the clause is present in the doc; obedience depends
      on agent instruction-following.
    deferred_to_feature_iteration: false
  - description: >
      FIXED (see resolved_items): auto-initiated regen fails, aborts, or is
      Phase-4-rejected — without an explicit escape clause, pre-thinking has no
      documented exit. flow.md's "do not proceed until regen completes" combined
      with codebase-map's "regen complete only when all phases + Phase 4 confirm"
      created a deadlock: a failed regen has no exit, risking indefinite block or
      dishonest "completed" claim. Fixed by adding the escape clause to both
      pre-thinking/SKILL.md and pre-thinking/flow.md step 3; guarded by DC-5
      death test.
    deferred_to_feature_iteration: false

