resolved_items:
  - original_section: known_shortcuts (task-3-scar)
    original_description: >
      Task 3's Fail-Honest Write Contract instructs writing `stale_reason` on failed
      regen, but the template never defined or mentioned the field — making every
      agent-written stale_reason a ghost field invisible to schema consumers, silently
      droppable by a later successful regen.
    resolution: >
      Added `stale_reason` as a commented-optional field to
      skills/codebase-map/templates/codebase-map.yaml, immediately after `last_updated`.
      The comment documents: (a) the field is OPTIONAL / absent on success, (b) written
      only by the Fail-Honest Write Contract on failure/abort/Phase-4-rejection, (c) two
      example values matching the SKILL.md contract wording.  Added a death test
      (test_death__stale_reason_is_documented_but_not_a_default_key) guarding both poles:
      field is in template text AND field is not a populated parsed-YAML key.
      Death test went RED before edit, GREEN after.  Full suite: 733 passed.

narrative: >
  Minimal fix: one commented block in the template + one death test.  No schema validator
  was built, no stale_reason handling code was added anywhere — the template is pure
  documentation; the Fail-Honest Write Contract in SKILL.md already governs the write.
  The refusal to build more structure is intentional: the contract is already written,
  the only gap was that the template schema did not acknowledge the field.

