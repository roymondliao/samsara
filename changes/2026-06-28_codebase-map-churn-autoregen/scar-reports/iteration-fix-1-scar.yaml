silent_failure_conditions:
  - description: >
      If the template is ever regenerated by parsing-then-reserializing (i.e.,
      yaml.safe_load + yaml.dump roundtrip), YAML comments are lost — the
      stale_reason documentation would disappear silently.  This is an existing
      risk for ALL comments in the template; this fix introduces no new vector,
      but the risk is real.  Only textual/manual template edits preserve comments.
    deferred_to_feature_iteration: false

