resolved_items:
  - original_section: assumptions_made
    original_description: >
      apply() scope arg not type-safe — caller passing unknown scope silently
      returns text unchanged, masking typos.
    resolution: >
      Added explicit ValueError guard in apply() for scope not in ('body', 'frontmatter').
      Added test_invalid_scope_raises_value_error in test_rules.py to verify.

  - original_section: assumptions_made
    original_description: >
      SKILL.md files with BOM or leading whitespace before '---' would be treated
      as having no frontmatter, silently — behavior was undocumented and untested.
    resolution: >
      Added test_bom_before_frontmatter_delimiter_treated_as_no_frontmatter and
      test_leading_whitespace_before_frontmatter_delimiter_treated_as_no_frontmatter
      in test_rules.py. These tests document and verify the known behavior rather
      than changing it, making the contract explicit.
