task_id: task-10
completion_status: done_with_concerns
# Concerns: Codex skill discovery not verifiable (no non-interactive discovery command);
# integration-marked tests run in normal suite when Codex is installed.

narrative: >
  Smoke test implemented in tests/integration/test_smoke_codex.py with 3 death test classes
  (7 tests) and 3 integration-marked classes (21 tests). Death tests guard the three critical
  failure modes: (1) graceful skip when Codex not installed, (2) isolation from real Codex
  config, (3) temp directory cleanup. Integration-marked tests verify structural validity
  of converted output: .codex-plugin/ layout, plugin.json/hooks.json JSON parse, SKILL.md
  presence and content, agent TOML parse validity. Codex discovery verification was deferred
  (see known_shortcuts) — codex CLI has no non-interactive skill-listing command.
  Codex CLI was installed on the test machine (codex-cli 0.124.0), so integration tests
  ran and passed (21/21).

known_shortcuts:
  - description: >
      Codex skill discovery test not implemented. There is no `codex --list-skills` or
      non-interactive skill-scanning command in Codex CLI 0.124.0. The only way to verify
      Codex actually discovers the installed skills is through an interactive Codex session,
      which cannot be automated. Current smoke tests verify structural validity (correct
      files exist, JSON/TOML parse, required fields present) — not runtime discovery.
      If Codex has a discovery bug that ignores structurally valid plugins, this smoke
      test would pass while the user sees no skills in their Codex session.
    deferred_to_feature_iteration: true

  - description: >
      No model interaction verification. The smoke test cannot verify that transformed
      skill instructions actually produce correct Codex model behavior. Structural
      verification that SKILL.md exists and is non-empty is not the same as verifying
      that Codex loads and applies the instructions. A skill with valid structure but
      semantically broken instructions (e.g., garbled transformation output) would pass.
    deferred_to_feature_iteration: true

  - description: >
      Hook script executability not verified. test_session_start_hook_script_exists
      checks that the script file exists but does NOT check that it's executable
      (chmod +x) or that it's valid bash syntax. A script with no execute bit set
      would cause Codex to fail silently when calling the session-start hook.
    deferred_to_feature_iteration: false

  - description: >
      The `smoke_install_dir` fixture is scoped to "module" — the pipeline runs once
      and all 21 integration tests share the output. This means a test that modifies
      the output directory (e.g., deletes a file) would cause subsequent tests in
      the same module to fail with confusing errors. Current tests are read-only, but
      a future test author could add a write operation and create ordering-dependent failures.
    deferred_to_feature_iteration: false

silent_failure_conditions:
  - description: >
      The `smoke_install_dir` fixture uses pytest.skip() inside a session-scoped
      generator fixture. If pytest's skip mechanism inside a fixture does not propagate
      correctly to all dependent tests (edge case in some pytest plugin combinations),
      tests could run with an uninitialized output directory and fail with FileNotFoundError
      instead of clean skips. First discoverer: developer who sees "FileNotFoundError"
      instead of "SKIPPED" in their test output on a machine without Codex.
    deferred_to_feature_iteration: false

  - description: >
      test_session_start_hook_script_exists checks the script path by joining
      smoke_install_dir with the command field from hooks.json. If the command field
      uses an absolute path (e.g., /usr/local/bin/script.sh) instead of a relative
      path, the join would produce /usr/local/bin/script.sh (ignoring smoke_install_dir)
      and the assertion might pass trivially or fail confusingly. Current conversion
      output uses relative paths, but this assumption is not enforced by the test.
    deferred_to_feature_iteration: false

  - description: >
      Integration-marked tests run in the normal test suite (pytest tests/) when Codex
      IS installed, not just with `pytest -m integration`. The task specified "Normal
      pytest tests/ should skip them." On machines with Codex installed, these tests
      will run and consume the pipeline overhead (~0.2s per run). They won't fail, but
      they add latency to the normal test suite on Codex-enabled machines.
      First discoverer: developer who notices 503 tests (vs 475) in their normal run.
    deferred_to_feature_iteration: false

assumptions_made:
  - assumption: >
      `codex --version` exits 0 when Codex CLI is installed. This is the standard
      convention for CLI version flags. If Codex uses a different flag (e.g.,
      `codex version` without `--`) or returns non-zero on success, all smoke tests
      would skip even when Codex is installed.
    verified: true
    note: >
      Verified locally: `codex --version` exits 0 and outputs "codex-cli 0.124.0".
      PlatformDetector uses the same command via version_cmd in codex.yaml.

  - assumption: >
      ConversionEngine("codex").run() uses only filesystem operations — it does not
      invoke the `codex` binary during conversion. Therefore, conversion can be run
      without an interactive Codex session.
    verified: true
    note: >
      Verified: conversion completes without any subprocess calls to codex.
      The Codex CLI binary is only referenced in PlatformDetector.detect(), which is
      not called by the ConversionEngine.

  - assumption: >
      The temp directory created by tempfile.mkdtemp(prefix="samsara-smoke-") is on
      the same filesystem as the output directory, making the ConversionEngine's
      shutil.move() atomic enough for test purposes. If the OS temp dir is on a
      separate filesystem (NFS, tmpfs), the move is a copy+delete — potentially
      leaving partial output visible briefly.
    verified: false
    note: >
      Not verified across filesystems. On macOS (test machine), /tmp is typically
      the same filesystem or a symlink to /private/tmp. Acceptable risk for local
      test runs. Not a CI concern since no cross-filesystem scenario in typical CI.
    deferred_to_feature_iteration: false

  - assumption: >
      tests/fixtures/source/ contains valid samsara source (3 skills, 1 agent,
      1 reference, 1 hook). If the fixture changes without updating this test,
      test_skill_count_matches_source_fixture may fail with a confusing mismatch.
    verified: true
    note: >
      Verified: Task 9's test_fixture_passes_source_validator confirms fixture validity.
      Fixture is under version control — changes require explicit commit.

  - assumption: >
      hooks.json 'command' field contains a relative path from the project root.
      test_session_start_hook_script_exists joins this path with smoke_install_dir
      to check file existence. If the command field is an absolute path, the test
      assertion logic would produce wrong results (see silent_failure_conditions).
    verified: true
    note: >
      Verified: expected fixture hooks.json uses
      '.codex-plugin/hooks/samsara-session-start.sh' (relative path).
      HookConverter always generates relative paths in the command field.

debt_registered: true
debt_location: >
  tests/integration/test_smoke_codex.py — integration-marked tests run in normal suite
  when Codex is installed (503 vs 475 in normal run); Codex discovery test deferred —
  no non-interactive skill-listing command in Codex CLI.

resolved_items:
  - original_section: known_shortcuts
    original_description: >
      Hook script executability not verified. test_session_start_hook_script_exists
      checked existence but NOT execute bit. A script without +x silently fails when
      Codex attempts to run it.
    resolution: >
      (1) Added os.access(script_path, os.X_OK) assertion to
      test_session_start_hook_script_exists in test_smoke_codex.py.
      The new assertion caught a real bug: engine.py was writing the script with
      write_text() but never calling chmod().
      (2) Fixed the underlying bug in samsara_cli/converter/engine.py: after writing
      samsara-session-start.sh, now calls script_path.chmod(0o755) to set rwxr-xr-x.
      All 503 tests pass including the new executability assertion.

  - original_section: silent_failure_conditions
    original_description: >
      test_session_start_hook_script_exists checks the script path by joining
      smoke_install_dir with the command field from hooks.json. If the command field
      uses an absolute path, the join would produce wrong results.
    resolution: >
      Added explicit assertion: `assert not command.startswith("/")` before joining
      the command with smoke_install_dir. If a future HookConverter change accidentally
      emits an absolute path in the command field, the test now fails with a descriptive
      error explaining the portability requirement — not a cryptic path join result.
