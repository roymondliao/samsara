resolved_items:
  - original_section: known_shortcuts
    original_description: >
      hook.sh.j2 was a structural stub (task-1 scar) that only echoed a static string
      and did not output the correct Codex JSON format. The DC-1 death test caught this
      immediately on first test run.
    resolution: >
      Updated hook.sh.j2 to include: reading samsara-bootstrap/SKILL.md, escape_for_json
      function for proper bash JSON escaping, and printf '{"systemMessage":"%s"}\n'
      output. The template now produces a bash script that emits Codex-compatible JSON
      on execution. DC-1 death tests now pass (verified).

  - original_section: silent_failure_conditions
    original_description: >
      Claude Code matchers ('clear', 'compact') in session_start_matchers would
      silently produce a hooks.json that never fires on Codex session events.
    resolution: >
      Added explicit validation in convert_hooks_json: raises ValueError immediately
      if 'clear' or 'compact' appear in the matchers list. Also validates matchers
      list is non-empty. The death test DC-2 verifies this. The validation runs at
      call time — not at config load time (which remains a gap due to FormatsConfig's
      raw dict type).

  - original_section: known_shortcuts
    original_description: >
      Template stub rendering variable names were unverified (task-1 scar note:
      "Template variable names (e.g., developer_instructions, system_message, agents)
      are assumed based on the field_mapping spec").
    resolution: >
      Verified and aligned template variables for hooks.json.j2 (session_start_matchers,
      hooks_dir, system_message) and hook.sh.j2 (hook_name, event, plugin_dir, skills_dir)
      against the actual template content. All 35 tests pass with these variable names —
      StrictUndefined would have caught any mismatch at render time.

  - original_section: known_shortcuts
    original_description: >
      convert_script uses the same hook.sh.j2 template for all hook names, causing
      check-codebase-map to emit session-start content (bootstrap SKILL.md injection)
      instead of codebase-map status content.
    resolution: >
      Added convert_check_codebase_map_script() as a dedicated method on HookConverter.
      The behavioral regression (codebase-map logic not adapted for Codex because
      CLAUDE_PROJECT_DIR has no verified Codex equivalent) is preserved as a known
      shortcut — callers should use the dedicated method for check-codebase-map hooks.
      Added scar report documentation. The common convert_script() path now has docstring
      noting this behavioral difference.

  - original_section: known_shortcuts
    original_description: >
      Unicode control character gap in bash escape_for_json.
    resolution: >
      Added explicit comment in hook.sh.j2 template documenting this gap:
      "Known gap: Unicode control characters (U+0000-U+001F) are not escaped."
      The gap itself is not fixed (would require jq or python for proper unicode
      escaping in bash) — making it visible is the scope-appropriate resolution.

  - original_section: assumptions_made
    original_description: >
      PLUGIN_DIR relative path assumption — if Codex executes hooks from a directory
      other than the project root, PLUGIN_DIR resolves incorrectly.
    resolution: >
      Added explicit inline comment in hook.sh.j2 template documenting this assumption
      and its failure mode: "If Codex executes from a different directory, PLUGIN_DIR
      will resolve incorrectly and SKILL.md will not be found — injecting
      'Error reading samsara-bootstrap skill' as context instead of empty."
      The assumption cannot be verified without Codex runtime access — marked
      deferred_to_feature_iteration in the assumption entry.
