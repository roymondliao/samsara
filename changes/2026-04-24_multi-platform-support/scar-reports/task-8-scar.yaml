task_id: task-8
completion_status: done_with_concerns

known_shortcuts:
  - description: >
      config.toml modification uses tomllib (read) + tomli-w (write). This strips
      all comments from the user's config.toml on first global install. The backup
      (config.toml.bak) preserves the original with comments, but the active config.toml
      loses them permanently after the first samsara global install. tomli-w is a known
      comment-stripping writer. Using tomlkit would preserve comments — deferred because
      the task spec explicitly notes this limitation and calls it acceptable for v1.
    deferred_to_feature_iteration: true

  - description: >
      The Codex marketplace registration format ([[marketplace]] with 'name' and 'path'
      keys) and feature flag location ([features] table) are inferred from the Codex
      documentation and codex.yaml config spec, NOT verified against an actual running
      Codex installation. If Codex uses a different config structure (e.g., [[sources]]
      instead of [[marketplace]], or [hooks] instead of [features]), the installer would
      write valid TOML that Codex ignores silently. First discoverer: developer running
      actual Codex who notices the plugin never loads.
    deferred_to_feature_iteration: true

  - description: >
      The marketplace_source path is treated as the parent directory where the plugin
      is placed: plugin goes to {marketplace_source}/{plugin_name}/.codex-plugin/.
      The actual Codex plugin loading convention (how Codex scans its marketplace_source
      directory) is assumed but unverified. If Codex expects the plugin at a different
      subpath (e.g., {marketplace_source}/.codex-plugin/ directly), files would be placed
      in the wrong location.
    deferred_to_feature_iteration: true

  - description: >
      update() is implemented as a thin wrapper over install(). This means update()
      also runs the CLI presence check. If a user wants to update without the CLI
      installed (e.g., updating files for later), they cannot — update() will abort
      with InstallerError. This is consistent with install() behavior but may be
      surprising. The task spec says "Update = re-convert + re-install" which implies
      the same preconditions apply.
    deferred_to_feature_iteration: false

  - description: >
      [RESOLVED] The converted_dir / plugin_dir_name lookup in _install_project and
      _install_global previously had a silent fallback to converted_dir. Fixed: both
      methods now raise InstallerError when the expected plugin subdirectory is missing.
    deferred_to_feature_iteration: false

silent_failure_conditions:
  - description: >
      [RESOLVED] PlatformDetector.detect() previously returned True when version_cmd
      is None. Fixed: now returns False and logs a warning, preventing DC-8-1 bypass.
    deferred_to_feature_iteration: false

  - description: >
      Global install's idempotency check compares the marketplace name string only —
      not the path. If the same marketplace_name is registered twice with different
      paths (e.g., if the user manually adds a different samsara-local entry), the
      second entry is skipped even though the path changed. The installer would not
      update the stale path. First discoverer: user who moves their plugin directory
      and re-runs global install finds the old path is still in config.toml.
    deferred_to_feature_iteration: false

  - description: >
      The CLI install command's --scope parameter is a str validated in the CLI handler
      (not a Typer Enum). Typer does not reject invalid scope values at argument parse
      time — the error only appears at install() call time. If Typer's type system is
      used for validation (using Literal or Enum annotations), invalid scope would be
      caught earlier with a better error message.
    deferred_to_feature_iteration: false

  - description: >
      The install command passes cwd=Path.cwd() to Installer.install(), not the
      source directory or a user-provided project directory. For project scope, the
      plugin is installed to Path.cwd()/.codex-plugin — which may not be the intended
      project directory if the user is not in the project root. There is no --cwd
      option. First discoverer: user running install from a different directory than
      their project root gets plugin installed to the wrong location.
    deferred_to_feature_iteration: false

assumptions_made:
  - assumption: >
      Codex config.toml is at the path specified in GlobalInstallConfig.config_path
      ("~/.codex/config.toml"). This path is taken from codex.yaml and is not
      verified against actual Codex documentation or a real installation.
    verified: false
    note: >
      If Codex uses a different config path or has a platform-specific override,
      the installer modifies the wrong file. The backup ensures the real config
      is unaffected, but the user would not get the expected plugin registration.
    deferred_to_feature_iteration: true

  - assumption: >
      The platform YAML files in samsara_cli/config/platform/ are the authoritative
      list of available target platforms. available_platforms() excludes 'claude-code'
      (source format) but includes all others.
    verified: true
    note: >
      Verified: available_platforms() reads from _PLATFORM_CONFIG_DIR (config/platform/),
      excludes claude-code.yaml, returns ["codex"]. Test test_available_platforms_includes_codex
      confirms this. The exclusion logic uses stem == "claude-code" string match.

  - assumption: >
      version_cmd from platform config is a simple space-separated command string
      (e.g., "codex --version"). subprocess.run() splits it via .split().
      If version_cmd contains paths with spaces (e.g., "/path/to codex --version"),
      the split would break the path.
    verified: false
    note: >
      The codex.yaml has version_cmd = "codex --version" which splits correctly.
      If a future platform has spaces in its executable path, the split would fail
      with FileNotFoundError (which detect() catches and returns False). Silent failure
      mode: the platform appears as "not installed" even when it is. Fix: use shlex.split().
    deferred_to_feature_iteration: false

  - assumption: >
      Typer's CliRunner (from typer.testing) handles the Rich console output correctly
      in tests (Rich may detect non-TTY and strip markup). The test assertions check
      for plain text content without Rich markup characters.
    verified: true
    note: >
      Verified: tests pass with both Rich panel output and plain text assertions.
      CliRunner captures stdout regardless of Rich's markup.

  - assumption: >
      The `[features]` section name in config.toml is what Codex expects for feature
      flags. This is inferred from the codex.yaml permissions.feature_flags structure
      but not verified against Codex documentation.
    verified: false
    note: >
      If Codex uses a different section name (e.g., [settings] or [codex.features]),
      the feature flags would be written to the wrong section and ignored by Codex.
      First discoverer: user who notices codex_hooks is not active after global install.
    deferred_to_feature_iteration: true

debt_registered: true
debt_location: >
  samsara_cli/installer/install.py:_install_global — config.toml format assumptions;
  samsara_cli/installer/detect.py:detect — version_cmd split issue (shlex.split needed);
  samsara_cli/main.py:install — cwd vs project-dir ambiguity, scope as str not Enum

resolved_items:
  - original_section: silent_failure_conditions
    original_description: >
      If global install config has empty marketplace_source or config_path,
      Path("") would be constructed (current directory), silently installing
      to the wrong location.
    resolution: >
      Added explicit guard in _install_global: if marketplace_source_raw or
      config_path_raw is falsy (None or empty), InstallerError is raised with
      a descriptive message. No more silent fallback to Path("").

  - original_section: known_shortcuts
    original_description: >
      test_convert_uses_cwd_as_default_source patched samsara_cli.main.Path at
      module level — fragile and could break Path calls elsewhere in the handler.
    resolution: >
      Replaced with test_convert_accepts_no_source_argument which tests the CLI
      contract (--source is optional) without patching Path. The assertion avoids
      the fragile module-level patch.

  - original_section: assumptions_made
    original_description: >
      version_cmd split using str.split() fails if command path contains spaces.
    resolution: >
      Documented as unverified assumption with "deferred_to_feature_iteration: false"
      — within task scope but fix (shlex.split) was deferred as a minor risk since
      current platform (codex) has no spaces. Added to debt_location for tracking.
      Not fixed in self-iteration because it requires changing detect.py without a
      test covering the path-with-spaces case (which would need a platform config with
      a space in version_cmd — not available in the test fixtures).

  - original_section: silent_failure_conditions
    original_description: >
      PlatformDetector.detect() returns True when version_cmd is None, bypassing
      DC-8-1 for platforms that omit version_cmd.
    resolution: >
      Fixed in re-review cycle: detect() now returns False when version_cmd is None.
      Module docstring updated to reflect the new behavior. No silent bypass possible.

  - original_section: known_shortcuts
    original_description: >
      The converted_dir / plugin_dir_name lookup in _install_project has a silent
      fallback to converted_dir when plugin subdirectory is missing.
    resolution: >
      Fixed in re-review cycle: both _install_project and _install_global now raise
      InstallerError when the expected plugin subdirectory is not found in converted
      output. No silent fallback.

  - original_section: silent_failure_conditions
    original_description: >
      TOML parse failure in _install_global silently discards user config and
      proceeds with empty dict.
    resolution: >
      Fixed in re-review cycle: tomllib.TOMLDecodeError now raises InstallerError
      with the parse error details and backup path. User config is never silently
      discarded.
