resolved_items:
  - original_section: assumptions_made
    original_description: tempfile.mkdtemp + shutil.move atomicity
    resolution: >
      Verified shutil.move source code: uses os.rename() first (atomic on POSIX same-filesystem),
      falls back to copy+delete only on OSError (cross-device). Same-filesystem case IS atomic.
      Cross-filesystem case documented as known shortcut. Assumption marked verified: false
      because the cross-filesystem case remains unhandled and untested.

  - original_section: assumptions_made
    original_description: All converters are in-memory and do not write partial output to disk
    resolution: >
      Verified by reading all converter implementations (tasks 3-6). SkillConverter.convert()
      returns ConvertedSkill (in-memory). AgentConverter.convert() returns ConvertedAgent (in-memory).
      HookConverter methods return strings/dicts (in-memory). ManifestConverter.convert()
      returns dict (in-memory). ReferenceConverter.convert() returns string (in-memory).
      Engine is the sole writer to disk. Contract confirmed.

  - original_section: assumptions_made
    original_description: TOML agent [agent].name field structure assumption
    resolution: >
      Verified by reading samsara_cli/config/templates/codex/agent.toml.j2 — confirms
      [agent] section with name = "{{ name }}" field. TargetValidator._extract_agent_name_from_toml()
      correctly reads parsed["agent"]["name"]. Marked verified: true.

  - original_section: known_shortcuts
    original_description: Variant pattern detection (multiline invoke `samsara:X`)
    resolution: >
      No fix attempted — the primary use case (single-line pattern) is covered.
      The multiline variant does not appear in any current samsara source files
      (verified by inspection of all 11 skills). Documented as known shortcut with
      deferred_to_feature_iteration: false (acceptable risk for current sources).

  - original_section: silent_failure_conditions
    original_description: >
      Engine does not detect cross-filesystem move before calling shutil.move.
    resolution: >
      Added filesystem detection in engine.run() before shutil.move. Uses os.stat().st_dev
      to compare temp dir and output dir parent. If they differ (cross-filesystem),
      emits UserWarning with explicit explanation of atomicity risk. The move proceeds
      (not blocked) — this is a non-fatal risk disclosure, not a hard error.
      The warning text names the specific risk (copy+delete vs rename) and suggests
      keeping both paths on the same filesystem.

  - original_section: assumptions_made
    original_description: tempfile.mkdtemp + shutil.move atomicity
    resolution: >
      Added explicit filesystem detection (st_dev comparison) before shutil.move.
      Same-filesystem case: uses os.rename (atomic on POSIX). Cross-filesystem case:
      emits UserWarning and uses copy+delete (non-atomic). The assumption is now
      partially verified: same-filesystem IS atomic; cross-filesystem is disclosed.
      Status changed from verified: false to: partially mitigated via runtime detection.

narrative: >
  Task 7 implements the conversion orchestration layer: ConversionEngine (engine.py),
  SourceValidator (source.py), and TargetValidator (target.py). Together they implement
  the all-or-nothing contract that the architecture specifies.

  The primary design challenge was the all-or-nothing guarantee. The engine uses
  tempfile.mkdtemp() + shutil.move() rather than writing directly to the final output
  path. All converters (tasks 3-6) are in-memory — they return objects, not write files.
  The engine is the sole writer. On any failure, the except block in run() deletes the
  temp dir before re-raising. The DC-7-1 death test confirms this: after a patched agent
  converter failure, the output dir does not exist.

  The TargetValidator implements cross-validation between agent TOML files and skill
  companion files. The key insight: the TargetValidator must parse the TOML to extract
  the [agent].name field (not just check the filename) because the death case is a
  TOML with name="implementer" (no prefix) vs a dispatch-template.md referencing
  "samsara-implementer". The name is inside the TOML, not in the filename.

  The SourceValidator uses the source directory contents to derive expected_skills
  (not a hardcoded canonical list). This means it validates SKILL.md presence but
  cannot catch "a whole skill is missing from the source". This was documented as
  a known shortcut in the scar — fixing it would require adding a canonical skill
  list to the platform config, which is an architectural change beyond task scope.

  All 349 tests pass. No regressions from existing task tests.
