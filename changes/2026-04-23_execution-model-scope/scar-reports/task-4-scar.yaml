  references/iac-review.md Step 5 (provider-specific patterns explicitly excluded — scope shortcut)

resolved_items:
  - original_section: known_shortcuts
    original_description: >
      Zombie security group rules — Critical/Important nuance inconsistency between step body
      and Pattern Application Notes.
    resolution: >
      Fixed directly in references/iac-review.md. Changed the Step 1 Zombie security group rules
      severity statement from "Zombie security group rules are Critical." (unconditional) to:
      "Zombie security group rules are Critical when the full association graph is visible in
      the diff and no consumer is found. When the full graph is not visible (diff-only review,
      module boundary), downgrade to Important and note 'Unable to verify security group
      consumers within this diff.'" The inconsistency with Pattern Application Notes is resolved.

  - original_section: silent_failure_conditions
    original_description: >
      The severity distinction for ignore_changes (Critical for all, Important for named lists)
      is stated in the preamble but a reviewer could miss the preamble and apply only the
      per-bullet severity.
    resolution: >
      Verified that the per-bullet severity labels are already self-contained and explicit:
      line 178 reads "ignore_changes = all — **Critical**" and line 182 reads
      "ignore_changes = [tags] — **Important**". The severity appears inline in each bullet,
      not only in the preamble. The reading-order risk is mitigated — both bullets are
      independently readable without the preamble. The preamble is now redundant safety.
      Condition remains in scar as documentation of the design decision.

  - original_section: silent_failure_conditions
    original_description: >
      Dead Outputs — child vs. root module ambiguity: reviewer may not know the module type
      and could incorrectly escalate root module dead outputs to Critical.
    resolution: >
      Fixed directly in references/iac-review.md. Added explicit disambiguation guidance to
      the Dead Outputs section: "How to determine module type: A root module is one called
      directly by terraform apply — it has a terraform {} block or is the entry point. A child
      module is called via module '<name>' { source = ... }. If you cannot determine the module
      type from the diff, treat it as root module (apply the more lenient severity)." Also
      updated the severity statement to add "When module type is ambiguous, classify as Important
      and note the ambiguity." The ambiguity path now has explicit guidance.
