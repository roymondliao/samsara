type: fast_track
description: "Add two Karpathy-aligned implementer rules — Dependency Hygiene (VIII) as a Prohibited Behavior, and Read-Before-Write (I) as an Execution-Order step ordered before death tests — with inline-mode echoes and a doc-contract guard test."

death_clause: "If agents/implementer.md can be trimmed or reordered (read-before-write moved after the death-test step, or the dependency-hygiene clause removed) without any test going red, this change has failed."

acceptance:
  - "agents/implementer.md Prohibited Behaviors contains 'No silent dependency addition' (ask stdlib / existing dep first; record why one earns its place)"
  - "agents/implementer.md Execution Order contains a 'Read before you write' step ORDERED BEFORE the 'Write death tests' step"
  - "skills/implement/SKILL.md Yin-Side Constraints echoes both rules for inline mode C; Red Flags lists the dependency + read-before-write violations"
  - "tests/test_agents/test_implementer_contract.py guards all of the above (presence + ordering + inline echo); RED before the edits, GREEN after"
  - "Full suite green with no regression (705 passed)"

scar_tag: 1
scar_items:
  - "Doc-presence/ordering tests guard that the rules are WRITTEN and correctly ordered, but cannot prove an agent OBEYS read-before-write or dependency-hygiene at runtime — same limitation as the codebase-map Task 3 doc contracts. Real proof is a live implementer session. Accepted: doc space has no stronger guard; the guard test at least stops silent deletion (the Issue-001 rot)."
  - "Watch: if the samsara_cli converter freezes expected fixtures for agents/implementer.md or skills/implement/SKILL.md, those may now be stale. Full suite is green (no frozen-snapshot test compared this content), so not breaking — but regenerate fixtures if a converter snapshot test is added later."

files_changed:
