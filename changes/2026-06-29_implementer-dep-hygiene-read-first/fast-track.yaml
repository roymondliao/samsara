  - criterion: "C5 Reuse"
    checked: true
    note: "Inline-mode echo in implement SKILL.md mirrors the EXISTING structural-honesty inline constraint pattern (same shape, adjacent bullet) rather than inventing a new mechanism. The _execution_order_section test helper has a single home (the ordering test)."
  - criterion: "C6 Clear Structure"
    checked: true
    note: "Each edit placed in its correct section: Prohibited Behaviors (#6), Execution Order (new step 2, renumbered 3-13), Self-Review (2 bullets), implement SKILL.md Yin-Side Constraints (inline echo) + Red Flags (2 lines)."
  - criterion: "C7 Elegant Logic"
    checked: true
    note: "Section-scoped ordering check via _execution_order_section is the minimal correct structure — the naive whole-file find matched intro prose ('You write death tests...'), so scoping is protection, not decoration. No extra wrappers."
  - criterion: "C8 No Redundancy"
    checked: true
    note: "Deleted the redundant whole-file read-before-write presence test (subsumed by the section-scoped ordering test). The dep-hygiene rule's appearance at canonical + enforcement points is the framework's established multi-point pattern (one rule referenced), not a split-truth."
