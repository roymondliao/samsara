known_shortcuts:
  - description: |
      v2 的 9 原則 authoritative framing 完全來自 research dialogue 1 的 yin-SOLID
      重定義 + 我們 synthesis 的 Cohesion/Coupling/DRY/Pattern 四條。沒有 external
      philosophical 文獻作為 corroboration。若 dialogue 1 的 framing 日後被發現有
      邏輯問題，此 reference 整份結構要重審。
    deferred_to_feature_iteration: false

  - description: |
      v2 的 koan 是我的 draft，每條原則 3 個 koan。Koan 的「畫面感 + spirit」平衡
      沒有經過他人 review——可能有誘人 miss-read（讀者看 koan 形成直覺但判斷方向
      偏離 axiom）。這在 Task 5 integration validation 或首次實地使用時會暴露。
    deferred_to_feature_iteration: true

  - description: |
      Outcome cross-reference table 的 mapping 是我的 judgment call。v2 initial
      draft 把 C5 (Reuse) 定義為 outcome 但沒有任何 principle map 到——
      unreachable term。Yin reviewer 抓到後修正為 DRY → C5+C8+C2。此修正之後，
      每個 outcome (C1-C8) 都至少被一個 principle map 到（bipartite completeness
      hold）。但 mapping 本身未經實地驗證，多個 principle 可能同時 surface 同一
      outcome，agent 可能分類不一致。
    deferred_to_feature_iteration: true

  - description: |
      Koan "Name-level promise" 在 I principle（介面宣告 `sort()` 實作 `shuffle()`）
      和 yin reviewer 的 dishonest-naming scope 有重疊。dialogue 1 把它放在 I，
      v2 沿用，但 yin reviewer audit 指出 overlap——可能造成 reviewer agent
      flag 同問題兩次。未明確移除或重置。
    deferred_to_feature_iteration: true

  - description: |
      No code examples 意味 Task 5 的 fixtures 必須由 reviewer agent 自己做
      「抽象 (koan) → 具體 (真實 code)」的翻譯。這個翻譯能力變成 critical path。
      Task 2 的 agent prompt 需要 explicit 指示如何 pattern-match koan 到
      真實 code，否則 reference 的價值退化為哲學朗誦。
    deferred_to_feature_iteration: false

silent_failure_conditions:
  - description: |
      Principle → outcome cross-ref table 若 drift，無自動化更新。T4 smoke test 只
      enforce 9 個 principle headers 存在，不 enforce cross-ref table mapping
      和 headers 一致。新加 principle 或刪除 principle 時，cross-ref 不會自動同步。
    deferred_to_feature_iteration: true

  - description: |
      Reviewer agent 若不 read 此 reference（fallback to memory / 讀失敗靜默），
      會 fall through 到未驗證的 default behavior。此 reference 本身沒有 fallback
      mechanism；agent 的 "UNKNOWN when unreadable" 行為由 Task 2 的 agent prompt
      負責。若 Task 2 實作有 bug，reference 無法自救。
    deferred_to_feature_iteration: true

