    verified: false
    note: |
      基於 dialogue 1 的 yin-philosophy + bipartite completeness（每個 outcome
      都至少被一個 principle 對應）確認。但不排除 blind spots。
    deferred_to_feature_iteration: true

  - assumption: |
      Koan 格式（短句 + 畫面感 + 無具體 code）能讓 reviewer agent 有效 pattern-match
      到真實 code。
    verified: false
    note: |
      Task 5 integration validation 是第一次實測。
    deferred_to_feature_iteration: true

  - assumption: |
      `samsara/references/` 是正確的 directory convention。
    verified: false
    note: |
      未在 samsara README 文件化新 convention。
    deferred_to_feature_iteration: true

  - assumption: |
      選擇 α+δ（純敘事 + koan）而非 β+δ（pseudo-code + koan）的決定。
    verified: true
    note: |
      通過 /level-analysis 三層評估，User 採納 Principal 觀點。

