    original_description: >
      D4 test originally counted all C-criterion mentions globally across SKILL.md,
      including rationale prose and schema template entries — would have counted
      well more than 4 even with exactly 4 bullet items in Step 4.
    resolution: >
      Rewrote D4 to match only `^\- \*\*C[0-9]` pattern, which targets bullet-item
      format specifically. Verified correctly counts 4 at current content.
      (Note: the corrected pattern has residual global-scope fragility — recorded
      as a separate outstanding item in known_shortcuts, not here.)

  - original_section: "known_shortcuts"
    original_description: >
      Dot-diagram Step 4 node label still showed old yin-only summary
      "簡化 code review（能刪？命名說謊？）" — inconsistent with Step 4 prose
      which now includes quality questions.
    resolution: >
      Updated dot-diagram label to "yin: 能刪？命名說謊？ / quality: C5/C6/C7/C8".
      Diagram now honestly reflects both faces of the review.

  # --- Yin code-reviewer audit Round 2 resolved items (scar integrity fixes) ---

  - original_section: "yin_audit_critical_1_scar_integrity"
    original_description: >
      Prior scar report classified `checked: true → checked: false` template change
      as a resolved_item for the template-copy silent failure. This was a
      misclassification: `checked: false` is mitigation (makes lazy copy visually
      wrong) but does not resolve the failure (an agent can still fill
      `checked: true` with formulaic notes and pass). The silent failure remains
      real. Listing it as resolved misrepresented the state of defense.
    resolution: >
      Reclassified in this rewrite: template-copy failure correctly remains in
      silent_failure_conditions (not resolved_items); `checked: false` change
      is noted as mitigation in the narrative Decision Log, not as resolution.
      Labeling now matches actual defense state.

  - original_section: "yin_audit_critical_2_scar_integrity"
    original_description: >
      Prior scar report listed the dot-diagram update in BOTH known_shortcuts
      ("intentionally terse, left as-is") AND resolved_items ("updated to include
      quality criteria"). These are contradictory — the shortcut entry should have
      been removed when the item was resolved.
    resolution: >
      Removed stale known_shortcut entry in this rewrite. Dot-diagram update
      appears only in resolved_items (where it belongs, since the diagram was in
