      fix:
        - "code-reviewer.md missing scar report integrity checks and defer-all anti-pattern detection"
        - "scar-schema.yaml breaking change — plain string items no longer parseable"
        - "blocked fix in iteration loop has no fallback — item stays in queue indefinitely"
      accept:
        - description: "Subagent context window may be insufficient for self-iteration"
