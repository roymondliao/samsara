          expiry_date: "2026-10-19"
          rationale: "High cost (ID system), low benefit (description edits are rare in v1)"
        - description: "Context window exhaustion may silently truncate self-iteration"
          expiry_date: "2026-10-19"
          rationale: "Same root cause as context window limitation"
        - description: "Self-iteration quality depends on agent self-discipline"
          expiry_date: "2026-10-19"
          rationale: "Inherent to prompt-based systems. Partially mitigated by code-reviewer fix #1"
        - description: "Safety valve max rounds hardcoded to 3"
          expiry_date: "2027-01-19"
          rationale: "v1 sufficient. Human gate allows early stop regardless"
        - description: "signal_lost counts all items equally without severity weighting"
          expiry_date: "2027-01-19"
          rationale: "v1 sufficient. Human triage compensates for lack of weighting"
