default_language_version:
    python: python3.14

exclude: |
  (?x)(
    .*uv.lock |
    .*_static |
    .*ipynb |
    ^data/
  )

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
    - id: check-yaml
    - id: end-of-file-fixer
    - id: trailing-whitespace
    - id: detect-aws-credentials
      args: [--allow-missing-credentials]
    - id: detect-private-key
    - id: name-tests-test
      args: ['--pytest-test-first']
      # Leading-underscore modules under tests/ are shared helpers, not test
      # files (e.g. tests/test_contract_bound_tests/_contract_tokens.py, the
      # single canonical concept-token source imported by sibling evaluators).
      exclude: ^tests/test_contract_bound_tests/_[^/]+\.py$
    - id: check-merge-conflict
    - id: check-added-large-files
      args: ['--maxkb=50000']
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.5
  hooks:
    - id: ruff-check
      args: [ --fix ]
    - id: ruff-format
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.15.0
  hooks:
    - id: mypy
      args:
        - --namespace-packages
        - --explicit-package-bases
        - --disallow-untyped-defs
        - --ignore-missing-imports
      exclude: ^tests/
      additional_dependencies:
        - pydantic>=2.12.5
        - wandb
        - types-PyYAML
        - PyYAML
- repo: https://github.com/pappasam/toml-sort
  rev: v0.24.2
  hooks:
    - id: toml-sort-fix
