# Scar Report Schema — Single Source of Truth
#
# This file defines the canonical scar report format for all samsara tasks.
# Used by: implementer agent (via dispatch prompt injection), inline/cowork mode (via scar-report.md)
#
# Location: changes/<feature>/scar-reports/task-N-scar.yaml (inside the feature directory)

# --- Schema ---

task_id: task-N
completion_status: done  # done | done_with_concerns | blocked

known_shortcuts:
  # What corners were cut? What would you do differently with more time?
  - description: "description of shortcut taken"
    deferred_to_feature_iteration: false  # OPTIONAL — true if this item cannot be fixed within task scope

silent_failure_conditions:
  # Under what conditions will this implementation silently produce wrong results?
  - description: "description of silent failure condition"
    deferred_to_feature_iteration: false  # OPTIONAL — true if this item cannot be fixed within task scope

assumptions_made:
  # What was assumed to be true? Mark verified: true only if you tested it.
  - assumption: "what was assumed"
    verified: false  # true | false
    note: "evidence if verified, consequence if not"
    deferred_to_feature_iteration: false  # OPTIONAL — true if verification requires cross-task context

debt_registered: true  # true if any known_shortcuts or silent_failure_conditions exist
debt_location: "file:line or description"  # null if debt_registered is false

narrative: |  # OPTIONAL — use only when structured fields above cannot capture the full scar context
  Free-form markdown for complex scars that need detailed explanation.
  Omit this field entirely if the structured fields are sufficient.

resolved_items:  # OPTIONAL — items fixed during task-level self-iteration (Level 1)
  # Each entry references what was fixed and how.
  # Only present after self-iteration; omit if no self-iteration was performed.
  - original_section: "known_shortcuts | silent_failure_conditions | assumptions_made"
    original_description: "the item that was fixed"
    resolution: "what was done to fix it"

# --- Rules ---
#
# 1. No empty scar reports — if all lists are empty, you haven't thought hard enough
# 2. completion_status:
#    - done: all tests pass, no unverified assumptions blocking correctness
#    - done_with_concerns: tests pass, but unverified assumptions could affect correctness
#    - blocked: cannot complete due to external dependency
# 3. debt_registered must be true if any known_shortcuts or silent_failure_conditions exist
# 4. narrative is optional — only use when structured fields cannot capture the scar
# 5. deferred_to_feature_iteration is optional — defaults to false if omitted
#    Use true only when the item genuinely requires cross-task context to fix.
#    All items deferred without rationale will be flagged by code reviewer.
# 6. resolved_items is optional — present only after task-level self-iteration.
#    Each resolved item must reference the original section and description.
# 7. Backward compatibility: scar reports without deferred flags or resolved_items
#    are valid. Missing deferred flag = false. Missing resolved_items = no self-iteration.
# 8. Plain string format backward compatibility: older scar reports may use plain strings
#    for known_shortcuts and silent_failure_conditions instead of objects:
#      known_shortcuts:
#        - "plain string description"
#    When aggregating (e.g., Level 2 iteration), treat plain strings as:
#      {description: "the string", deferred_to_feature_iteration: false}
#    Do not reject or silently skip plain string format items.

# --- Verbatim Example (with self-iteration) ---
#
# task_id: task-2
# completion_status: done_with_concerns
#
# known_shortcuts:
#   - description: "Sort order is insertion order, spec did not define sort logic"
#     deferred_to_feature_iteration: true  # needs cross-task discussion on global sort strategy
#
# silent_failure_conditions:
#   - description: "Topic folders not matching [0-9]{2}_* pattern are silently ignored"
#     # deferred_to_feature_iteration omitted = false (was fixed in self-iteration)
#
# assumptions_made:
#   - assumption: "All topic folder names match [0-9]{2}_* pattern"
#     verified: true
#     note: "All 10 current folders match — verified during self-iteration"
#   - assumption: "yaml.safe_load float normalization with :.5f is correct for all arxiv_id lengths"
#     verified: false
#     note: "If suffix > 5 digits, trailing digits lost"
#     deferred_to_feature_iteration: true  # needs cross-task audit of all arxiv_id handling
#
# debt_registered: true
# debt_location: "scripts/paper_scan.py — sort logic, float normalization"
#
# resolved_items:
#   - original_section: "silent_failure_conditions"
#     original_description: "Topic folders not matching [0-9]{2}_* pattern are silently ignored"
#     resolution: "Added warning log for non-matching folders in scan loop"
#   - original_section: "assumptions_made"
#     original_description: "All topic folder names match [0-9]{2}_* pattern"
#     resolution: "Wrote test verifying all 10 folders match — assumption now verified"
