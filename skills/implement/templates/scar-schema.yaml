# Scar Report Schema — Single Source of Truth
#
# This file defines the canonical scar report format for all samsara tasks.
# Used by: implementer agent (via dispatch prompt injection), inline/cowork mode (via scar-report.md)
#
# Location: scar-reports/task-N-scar.yaml

# --- Schema ---

task_id: task-N
completion_status: done  # done | done_with_concerns | blocked

known_shortcuts:
  # What corners were cut? What would you do differently with more time?
  - "description of shortcut taken"

silent_failure_conditions:
  # Under what conditions will this implementation silently produce wrong results?
  - "description of silent failure condition"

assumptions_made:
  # What was assumed to be true? Mark verified: true only if you tested it.
  - assumption: "what was assumed"
    verified: false  # true | false
    note: "evidence if verified, consequence if not"

debt_registered: true  # true if any known_shortcuts or silent_failure_conditions exist
debt_location: "file:line or description"  # null if debt_registered is false

narrative: |  # OPTIONAL — use only when structured fields above cannot capture the full scar context
  Free-form markdown for complex scars that need detailed explanation.
  Omit this field entirely if the structured fields are sufficient.

# --- Rules ---
#
# 1. No empty scar reports — if all lists are empty, you haven't thought hard enough
# 2. completion_status:
#    - done: all tests pass, no unverified assumptions blocking correctness
#    - done_with_concerns: tests pass, but unverified assumptions could affect correctness
#    - blocked: cannot complete due to external dependency
# 3. debt_registered must be true if any known_shortcuts or silent_failure_conditions exist
# 4. narrative is optional — only use when structured fields cannot capture the scar

# --- Verbatim Example ---
#
# task_id: task-2
# completion_status: done_with_concerns
#
# known_shortcuts:
#   - "PDF validity check only verifies file exists, not that it is a valid PDF"
#   - "Sort order is insertion order (topic alphabetical → yaml order), spec did not define sort logic"
#
# silent_failure_conditions:
#   - "Topic folders not matching [0-9]{2}_* pattern are silently ignored with no warning"
#   - "_metadata.yaml with papers: null (not empty list) is silently converted to empty list"
#
# assumptions_made:
#   - assumption: "All topic folder names match [0-9]{2}_* pattern"
#     verified: true
#     note: "All 10 current folders match"
#   - assumption: "yaml.safe_load float normalization with :.5f is correct for all arxiv_id lengths"
#     verified: false
#     note: "If arxiv_id has suffix longer than 5 digits, trailing digits are lost"
#   - assumption: "Insertion order for recommended_next is acceptable to users"
#     verified: false
#     note: "No user feedback collected; may need explicit sort logic later"
#
# debt_registered: true
# debt_location: "scripts/paper_scan.py — non-standard topic folder detection, sort logic"
