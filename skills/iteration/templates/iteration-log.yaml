# Iteration Log — Feature-Level Iteration Tracking
#
# Records each round of feature-level iteration (Level 2).
# Written to the feature's changes/ directory after iteration completes.
#
# Location: changes/YYYY-MM-DD_<feature>/iteration-log.yaml

# --- Schema ---

feature: "<feature-name>"
signal_lost_initial: 0  # signal_lost at iteration entry (before any rounds)

rounds:
  - round: 1
    signal_lost_before: 0  # REQUIRED — signal_lost at round start
    items_triaged: 0       # total items triaged this round
    triage_result:
      fix: []              # list of item descriptions triaged as fix
      accept: []           # list of {description, expiry_date, rationale}
      defer: []            # list of item descriptions deferred
    fixes_applied: 0       # number of fixes successfully applied
    fixes_scar_count: 0    # new scar items generated by fixes this round
    signal_lost_after: 0   # REQUIRED — signal_lost after fixes
    decision: continue     # continue | stop | forced_stop | interrupted
    decision_reason: ""    # why (human choice, safety valve trigger, session interrupt)

# --- Rules ---
#
# 1. signal_lost_before and signal_lost_after are REQUIRED for every round
# 2. decision must be one of: continue, stop, forced_stop, interrupted
# 3. accept items in triage_result MUST have expiry_date and rationale
# 4. If decision is forced_stop, decision_reason must include the safety valve trigger
# 5. If decision is interrupted, the round data may be partial — this is expected

# --- Verbatim Example ---
#
# feature: "paper-metadata-registry"
# signal_lost_initial: 8
#
# rounds:
#   - round: 1
#     signal_lost_before: 8
#     items_triaged: 8
#     triage_result:
#       fix:
#         - "yaml.safe_load float normalization may lose trailing zeros on arxiv_id"
#         - "non-standard topic folder naming silently ignored"
#       accept:
#         - description: "AI connection inference skews toward 'related' type"
#           expiry_date: "2026-07-15"
#           rationale: "AI capability limitation — revisit when model improves"
#       defer:
#         - "reading_path sort order not yet validated with users"
#     fixes_applied: 2
#     fixes_scar_count: 0
#     signal_lost_after: 5
#     decision: stop
#     decision_reason: "user chose to stop — remaining items acceptable for ship"
